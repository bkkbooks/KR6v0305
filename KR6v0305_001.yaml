就如是二法則其自業迫其入地獄如被棄捨世尊說是義已於彼經中世尊說如是偈劣智之人成就二法一是惡戒一是惡見如是之人身壞命終當墮地獄世尊說如是義如是我聞戒經之一終第六戒經之二此是諦實世尊如是語此經是世尊證阿羅漢已說如是我聞諸比丘若人成就二法則其自業引其生天如彼禮請云何二法謂一是善戒一是善見諸比丘若人成就如是二法則其自業引其生天如被禮請世尊說如是義已於彼經中世尊說如是偈有智之人成就二法一是善戒一如善見如是之人身壞命終必生天界世尊說如是義如是我聞戒經之二終第七勤經此是諦實世尊如是語此經是世尊證阿羅漢已說如是我聞諸比丘比丘無勤無愧不能證正覺不能涅槃不能證最上瑜伽安穩處法諸比丘比丘有勤有愧能證正覺能涅槃能證最上瑜伽安穩處法世尊說如是義已於彼經中世尊說如是偈比丘無勤無愧懶惰下勤多睡無慚不敬如是比丘不能悟證最上正覺有智比丘有慧有禪有愧有勤行不放逸斷生老結於現生中必證正覺世尊說如是義如是我聞勤經終第八無詐經之一此是諦實世尊如是語此經是世尊證阿羅漢已說如是我聞諸比丘比丘住於梵行不當詭詐而住不當矯妄而住不當為利養恭敬稱譽而住不當自念人當如是知我而住諸比丘比丘住於梵行當為律儀及為捨離而住世尊說是義已於彼經中世尊說如是偈佛陀世尊演說梵行為住律儀為諸捨離滅二世患達涅槃岸註二世患現世及來世之渴愛雜染如是之道諸佛已行諸人等眾當依佛說行於梵行如是諸人行佛所教必盡苦際世尊說如是義如是我聞無詐經之一終第九無詐經之二此是諦實世尊如是語此經是世尊證阿羅漢已說如是我聞諸比丘比丘住於梵行不當詭詐而住不當矯妄而住不當為利養恭敬稱譽而住不當自念人當如是知我而住諸比丘比丘住於梵行當為真知及遍知而住世尊說是義已於彼經中世尊說如是偈彼佛世尊演說梵行為住真知為住遍知滅二世患達涅槃岸如是之道諸佛已行諸人等眾當依佛說行於梵行如是之人行佛所教必盡苦際世尊說如是義如是我聞無詐經之二終第十歡喜經此是諦實世尊如是語此經是世尊證阿羅漢已說如是我聞諸比丘若比丘成就二法則於現世有大安樂有大歡喜如理精勤滅諸有漏云何二法謂一是憂畏諸苦警覺一是如理精勤警覺註憂畏諸苦即畏三世之生老病死苦諸比丘比丘成就如是二法則於現世有大安樂有大歡喜如理精勤滅諸有漏世尊說是義已於彼經中世尊說如是偈有智比丘有勤有慧以慧正觀憂畏諸苦警覺而住如是常住如理精勤寂靜不慢方便息心得盡苦際世尊說如是義如是我聞歡喜經終本品總攝經共一比丘經之一二比丘經之二三焦惱經四無焦惱經五戒經之一六戒經之二七勤經八無詐經之一九無詐經之二十歡喜經共十經第二集第二品第一尋思經此是諦實世尊如是語此經是世尊證阿羅漢已說如是我聞諸比丘如來應供正等覺佛世尊常行二尋思謂一是安穩尋思一是寂靜尋思諸比丘如來以無害為喜樂喜樂於無害如是是如來尋思以無害為喜樂者喜樂於無害當常作如是念我不害彼諸有怖畏眾生及諸無怖畏眾生怯弱眾生及兇惡眾生諸比丘如來以寂靜為喜樂喜樂於寂靜如是是如來尋思以寂靜為喜樂者喜樂於寂靜當常作如是念我已棄捨不善業諸比丘以此之故汝等當以無害為喜樂喜樂於無害如是是汝等尋思以無害為喜樂者喜樂於無害當常作如是念我不害彼諸有怖畏眾生及諸無怖畏眾生諸比丘汝等當以寂靜為喜樂喜樂於寂靜如是是汝等尋思以寂靜為喜樂者喜樂於寂靜當常作如是念我已棄捨不善業世尊說如是義已於彼經中世尊說如是偈如來佛陀降伏諸魔有二尋思一是安穩一是寂靜我說牟尼滅除黑暗到於彼岸得大利益是諸佛陀正等正覺所能到達有力無漏越輪迴苦盡渴愛法得最後身能棄捨魔達老彼岸有慧世尊有真實眼無有憂患登慧法宮見諸人眾不既超越諸憂患苦生老所覆如具眼人登於高山見山下人世尊說如是義如是我聞第一經終第二說法經此是諦實世尊如是語此經是世尊證阿羅漢已說如是我聞諸比丘如來應供正等覺佛陀有二種說法差別云何二種謂一是汝等當見惡是惡一是汝等見惡是惡已當厭當離當離脫於惡諸比丘如來應供正等覺佛陀有如是二種說法差別世尊說是義已於彼經中世尊說如是偈汝等當見如來佛陀慈憫眾生差別說法如來佛陀慈憫眾生已演說已令汝見惡見已離脫離脫惡已則苦終盡世尊說如是義如是我聞第二經終第三明經此是諦實世尊如是語此經是世尊證阿羅漢已說如是我聞諸比丘無明是導引不善業而繼之無慚無愧諸比丘明是導引善業而繼之有慚有愧世尊說是義已於彼經中世尊說如是偈此世他世等等惡趣無明為根貪欲所造有惡欲人無慚無愧而有惡生因惡之故墮入地獄以此之故汝等比丘當斷欲貪及彼無明令明生長則斷惡趣世尊說如是義如是我聞第三經終第四慧經此是諦實世尊如是語此經是世尊證阿羅漢已說如是我聞諸比丘眾生缺少聖慧名最缺少如是眾生於現生中住於苦聚有患有惱復有焦慮身壞命終惡趣可期諸比丘眾生不缺少聖慧名不缺少如是眾生於現生中住於樂聚無患無惱復無焦慮身壞命終善趣可期世尊說是義已於彼經中世尊說如是偈缺聖慧故執於名色見人天界執為是真滅漏之慧於世最勝慧能正知能滅生有諸人天眾皈依佛陀正等覺者有智有慧得最後身世尊說如是義如是我聞第四經終第五法經此是諦實世尊如是語此經是世尊證阿羅漢已說如是我聞諸比丘有二白法能護世間云何二法謂一是慚謂一是愧諸比丘此二白法不護世間則此世間無有生母伯母叔母阿闍黎妻或師尊妻等等差別世間混亂有如山羊羊雞豬狗狼之羣居諸比丘以二白法護世間故故有生母伯母叔母阿闍黎妻或師尊妻等等差別世尊說是義已於彼經中世尊說如是偈若諸眾生於一切時無慚無愧失白法根必再生死有諸眾生於一切時有慚有愧如是眾生梵行增長住於寂滅亦盡後有世尊說如是義如是我聞第五經終第六無生經此是諦實世尊如是語此經是世尊證阿羅漢已說如是我聞諸比丘法爾無生無後有無作無為而是有故諸比丘若法爾無生無後有無作無為而是無故則解脫於法爾有生有後有有作有為之法不出現世間諸比丘以法爾無生無後有無作無為而是有故故解脫於法爾有生有後有有作有為之法出現世間世尊說是義已於彼經中世尊說如是偈有生有有有作有為是無定法墮在老死是病之巢危脆不堪貪欲為因不應悅彼應棄捨之而住靜息無疑有定無生無起無憂無染滅諸苦法諸行寂滅是最安樂世尊說如是義如是我聞第六經終第七界經此是諦實世尊如此語此經是世尊證阿羅漢已說如是我聞諸比丘有二涅槃界云何二界謂一是有餘依涅槃界一是無餘依涅槃界云何是有餘依涅槃界謂比丘住如是律戒是漏盡阿羅漢住盡梵行所作已辦捨諸重担證自義已盡諸有結正智解脫如是比丘仍受用喜不喜境受用苦樂以彼五根未敗壞故五根仍安立故諸比丘彼比丘貪滅已瞋滅已癡滅已我說是有餘依涅槃界諸比丘云何是無餘依涅槃界謂比丘住如是律戒是漏盡阿羅漢住盡梵行所作已辦捨諸重擔證自義已盡諸有結正智解脫彼比丘於愛漏所生一切諸受不復喜樂是寂滅清涼者諸比丘如是我名為無餘依涅槃界諸比丘如是是二涅槃界世尊說是義已於彼經中世尊說如是偈二涅槃界世尊依於無愛見眼而為宣說一涅槃界是現在法名有餘依以盡諸愛不再有故一涅槃界盡於未來滅一切有名無餘依有諸眾生知無為道心得解脫不再生有如是之人樂於漏盡涅槃之界證堅固法是安住者捨一切有世尊說如是義如是我聞第七經終第八獨居經此是諦實世尊如是語此經是世尊證阿羅漢已說如是我聞諸比丘汝等當以獨居為悅樂悅樂獨居心住於止常住於禪成就於觀增長空處諸丘丘汝等當以獨居為悅樂悅樂獨居心住於止常住於禪成就於觀增長空處如是則可期得二果謂一是現法阿羅漢果一是有取之不還果有煩惱餘依世尊說是義已於彼經中世尊說如是偈能令心寂有慧自護不見諸欲則見正法樂不放逸見放逸患如是之人不退於道近於涅槃世尊說如是義如是我聞第八經終第九學處經此是諦實世尊如是語此經是世尊證阿羅漢已說如是我聞諸比丘汝等當於學處有大勝利戒學定學慧學增上有最上慧有堅固解脫有最大智四念處觀諸比丘若汝等於學處有大勝利有最上慧有堅固解脫有最大智如是則有二果可期謂一是現法阿羅漢果一是有取之不還果有煩惱餘依世尊說是義已於彼經中世尊說如是偈學處圓滿不缺於法有大智慧見生滅盡得最後身是斷魔者達老彼岸以此之故諸比丘眾當悅於禪心住等持有正精進見生滅盡能伏魔軍達死彼岸世尊說如是義如是我聞第九經終第十覺悟經此是諦實世尊如是語此經是世尊證阿羅漢已說如是我聞諸比丘比丘應精勤求悟正念正知等持悅豫於一切時住於勝觀明見善業諸比丘若比丘精勤求悟正念正知等持悅豫於一切時住於勝觀明見善業如是則有二果可期謂一是現法阿羅漢果一是有取之不還果有餘依煩惱世尊說是義已於彼經中世尊說如是偈汝諸醒者當聽是語汝諸睡者當即醒覺從睡而醒是最勝人以諸醒者無所畏故諸醒覺者正念正知等持悅豫隨時勝觀有妙三昧能滅諸暗以此之故比丘當醒比丘當勤以慧護身常住禪定斷生老漏於此生中證無上覺世尊說如是義如是我聞第十經終第十一無幸處經此是諦實世尊如是語此經是世尊證阿羅漢已說如是我聞諸比丘有二種人當生無幸處當生地獄以不捨惡行故云何二種謂一是非梵行者而自稱是梵行者一是以無根非梵行誹謗彼圓滿清淨梵行者諸比丘如是二種人當生無幸處當生地獄以不捨惡行故世尊說是義已於彼經中世尊說如是偈妄語之人必墮地獄作惡業者而言不作如是二人俱墮地獄此二種人是惡業人身壞命終同生一界又諸人等袈裟纏頸而行惡法不自調制此等惡人必墮地獄以惡業故食熱鐵丸猶勝於彼諸污戒人食諸村人所供摶飯世尊說如是義如是我聞第十一經終第十二見經此是諦實世尊如是語此經是世尊證阿羅漢已說如是我聞諸比丘有諸人天障於二見或執著而住或超過而去具眼目者則能見之諸比丘有諸人天云何執著而住諸比丘有諸人天以後有為悅樂悅樂後有享樂後有如來說彼滅後有法諸人天心不踊躍不信受不安住不皈命諸比丘諸人天如是執著而住諸比丘有諸人天云何超過而去諸比丘有諸人天以後有為可惱可慚可厭悅樂於滅而作是言大德此身死後則斷滅則壞失不再生此是安穩此是最勝此是真實諸比丘有諸人天如是超過而去諸比丘如何是具眼目者諸比丘比丘於律儀中見五蘊生見五蘊生已而行厭離棄捨於欲而滅五蘊諸比丘具眼目者如是而見世尊說是義已於彼經中世尊說如是偈聖者弟子見五蘊生而能如實超越五蘊則能如實向於涅槃以有愛盡得解脫故聖者弟子知五蘊生而離愛有有與非有則彼比丘不再來生滅後有故世尊說如