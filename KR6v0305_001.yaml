body:
  text: 黃謹良敬譯經藏小部經第一卷第一小誦經歸命應供正等覺佛世尊一三歸依文我歸依佛我歸依法我歸依僧我再歸依佛我再歸依法我再歸依僧我三歸依佛我三歸依法我三歸依僧二十戒文我受持不殺生學處我受持不與取學處我受持不非梵行學處我受持不妄語學處我受持不飲穀酒菓酒學處我受持不非時食學處我受持不舞蹈唱歌音樂不往觀聽學處我受持不塗香香花薰香飾身學處我受持不坐臥高廣大牀學處我受持不受領金銀學處三三十一身分此身有髮毛爪齒皮肉筋骨骨髓脾心肝肋膜腎肺大腸小腸腸胃內新食物舊食物糞膽痰膿血汗脂肪淚血漿唾鼻液關節液尿腦腦膜四問沙彌文一云何名為一切眾生依食而住命二云何名為名與色三云何名為三受四云何名為四聖諦五云何名為五取蘊六云何名為六內處七云何名為七菩提分八云何名為八支聖道九云何名為九眾生居十云何名為十支具足阿羅漢五吉祥經如是我聞一時世尊在舍衛城祇陀林給孤獨長者園住時初夜已有一天人體發金光偏照祇園來至佛所向佛作禮却立一面以偈問佛眾多天人等願得諸吉祥願佛為宣說最上諸吉祥佛即以偈答言不與惡人交唯與賢人交尊敬應供者是最上吉祥多聞於諦語能文有戒律出言合正理是最上吉祥護養於妻子安住正命業如是諸二事是最上吉祥布施及淨行護養諸親族不作諸罪業是最上吉祥遠離諸惡業不飲諸酒類於法不放逸是最上吉祥恭敬及謙下知足及知恩隨時以聞法是最上吉祥安隱受教戒得見諸沙門隨時而談法是最上吉祥精進及梵行正見於聖諦實證般涅槃是最上吉祥心於世間法不動不憂傷離垢而安隱是最上吉祥人天如是作能勝諸怨敵隨處得吉祥此是最吉祥註世間法即得失毀譽稱譏苦樂等八法六三寶經在此處集會之鬼在空中集會之神請歡喜諦聽請諦聽請慈心加護晝夜供祭之人勿有放逸此世界或其他世界之可喜財物乃至天上之寶無能與佛如來等比佛寶是最勝上寶願此諦語令諸眾生得大吉祥釋迦牟尼世尊正念堅固說斷煩惱不死微妙之法一切諸法無能與聖法等比法寶是最勝上寶願此諦語令諸眾生得大吉祥最勝佛陀稱讚清淨三昧其他三昧不能等比法寶是最勝上寶願此諦語令諸眾生得大吉祥上善諸人所共稱讚八輩四雙是善逝弟子應受供養右繞而行布施由彼當得大果僧寶是最勝上寶願此諦語得大吉祥最勝瞿曇聖者身語淨已正念堅固無有戀著身命是諸聖者證阿羅漢果證不死涅槃盡諸煩惱享寂淨樂僧寶是最勝上寶願此諦語令諸眾生得大吉祥譬如大地標柱四風所不能動正觀聖諦者我說是人是上善人世間之法所不能搖動如是僧寶是最勝上寶願此諦語令諸眾生得大吉祥有諸聖者以甚深智慧悟解導師所說聖諦如是聖者雖住大放逸亦終不取第八生如是僧寶是最勝上寶願此諦語令諸眾生得大吉祥註第七生即斷三界見惑之預流果有諸聖者正見成就棄捨身見疑戒禁取見離於四惡趣不犯六逆罪如是僧寶是最勝上寶願此諦語得大吉祥註四惡趣即地獄畜生餓鬼阿修羅註六逆五逆加從他師有諸聖者雖身語意作惡亦不覆藏以彼聖者見於涅槃不覆藏自惡故如是僧寶是最勝上寶願此諦語令諸眾生得大吉祥初夏林樹花敷如佛所說無上勝法達涅槃際利益眾生如是佛寶是最勝上寶願此諦語令諸眾生得大吉祥最勝佛陀知最勝法與最勝法運最勝法說最勝法如是法寶是最勝上寶願此諦語令諸眾生得大吉祥有諸聖者厭離來生夙業已盡無來生業種子已盡無增長想是賢智者應證涅槃如燈燄熄如是僧寶是最勝上寶願此諦語令諸眾生得大吉祥在此集會之鬼或在空中集會之神同禮如其所逝之佛陀人天所共供養之佛陀願諸眾生得大吉祥在此集會之鬼或在空中集會之神同禮如其所逝之聖法人天所共供養之聖法願諸眾生得大吉祥在此集會之鬼或在空中集會之神同禮如其所逝之僧伽人天所共供養之僧伽願諸眾生得大吉祥七戶外經有諸餓鬼到其舊家立於戶外於四衢道於三衢道及近戶處諸親所供飯水噉物食品甚多無數而以夙業餓鬼諸親已不記憶有諸眾生有慈護心應為清淨妙好飲食依時施與而作願言此諸布施滿足諸親諸親獲福而諸亡親來集會者得多飲食當恭敬隨喜而作是言我等因彼彼親故獲此飲食願我諸親得大壽命施主所施福不唐捐餓鬼之地無有農植無有畜牧無有商業無有金銀交易人世諸親所施之物有如高處之水向低處流諸親所施能益餓鬼川流溢滿能令海滿人閒諸親所施之物亦令餓鬼利益溢滿有諸人等輒念往昔彼人贈我彼物彼人為我作彼等事彼是我親我友則當施與逝去之人哭泣悲傷歎息實不應作以對逝去諸親無有益故諸親仍如是生活故於僧伽中所作布施立益餓鬼經於長遠此諸親法今已開演無上供養汝等亦已為逝去諸親而作汝等亦為比丘眾增長大力汝等已得不小之福八伏藏經有諸人等將其財寶埋於深穴作如是念有事故時財能益我如是埋藏以避王難以避賊奪以避借取以備飢饉以備難時彼等於此世間如是埋藏財寶註深穴原文作深水如是深穴中埋藏財寶終未能成就彼等之一切利益何以故伏藏自移動故彼埋藏人記憶混亂忘失藏所故龍竊去故夜叉竊去故非愛之承繼人偷掘去故彼福盡時伏藏亦失註此處之龍泛指妖鬼魔鬼伏藏是福女人男人於布施淨戒及於支提僧伽賓客悲母慈父兄長順從調伏而埋伏之財寶是善伏藏人不能奪常相隨從彼既捨世此伏藏福亦隨彼去伏藏是福他不能取盜不能刧智者應當如是造作隨身福藏如是福藏能今人天隨所需財而給與之隨諸人天所願求事此之福藏亦給與之諸人天等有妙姿聲妙態妙身有大權位有大眷屬如是勝果由福藏故而能獲得一國之王大豪貴者轉輪王樂大天王位如是勝果諸人天等由此福藏而能獲得人間幸福天界悅樂涅槃勝樂如是勝果諸人天等由此福藏而能獲得修止觀者得善知識有大方便具明解脫如是勝果諸人天等由此福藏而能獲得無礙解脫解脫聲聞波羅密緣覺佛地如是勝果諸人天等由此福藏而能獲得福有如是勝果是故智人讚嘆造福九慈悲經族姓子欲求悟證寂靜應修行三學族姓子應勇猛率直正直可誡可諫柔和不慢知足少欲少世俗務活命簡素淨根寂定有智不燥不貪求諸族姓無有奸詐不為賢者所責等視眾生作是念言願諸眾生安樂幸福又諸眾生若怖若安若瘦若肥若長若大若高若短若見不見若遠若近若已生若未生如是眾生願皆安樂眾生不應毀侮眾生不應於一切處輕蔑彼等不應因瞋恨而互相苦苦族姓子應慈視一切眾生猶如一子寧捨身命而救護之族姓子應慈視無量世界上下左右不狹小不結怨執對無有仇敵族姓子如是慈心若行若住若坐若臥應如是作意無有疲倦諸有智者讚如是住者是諸聖戒律梵住者族姓子修如是慈無有妄心守護淨戒具足正見斷諸貪欲當不再臥母胎中小誦經終小部經第二法句經歸命應供正等覺佛世尊第一品雙品諸法以意為首以意為主以意成就有惡意者若言若行苦即隨彼以三惡故譬如車輪隨牛而行諸法以意為首以意為主以意成就有淨意者若言若行樂即隨彼以三淨故如影隨形有諸人等執怨而言彼人罵我彼人責我彼人勝我彼人奪我之物如是執怨怨不息滅有諸人等不執怨言彼人罵我彼人責我彼人勝我彼奪我物如是不怨怨自息滅於此世間於一切時不因執怨而怨得息唯不執怨其怨乃滅此是諦法彼諸作惡等眾不知彼我等眾將因諍論而令和敬共住諸眾同歸毀滅諸作善等眾則知所有執著私見能在和敬共住眾中滅盡無諍註本段泰日譯本甚難解原出波利耶象林故事佛因僧眾諍論廁所蓄水犯不犯戒相持不已佛乃往波利耶林安居返而說此茲據泰本本生經釋義意譯之以欲樂為美好不攝諸根不節量飲食懈怠不勤則為魔所困擾譬如大風搖撼弱樹不以欲樂為美好守攝諸根飲食知量正信精勤則不為魔所困擾譬如大風不能搖撼山岳未斷煩惱有如污水不自調伏無有誠實欲著袈裟亦不應著已斷煩惱如水清淨堅住淨戒能自調伏自有誠實如是之人可著袈裟有諸人等見無益法是有益法見有益法是無益法如是之人住邪思維不能獲於有益之法有諸人等見有益法是有益法見無益法是無益法如是之人住淨思維能獲有益之法譬如不善蓋屋雨則侵之貪欲之雨能侵不善修習之心譬如善蓋之屋雨不能侵貪欲之雨不能侵善能修習之心作惡業人現世悲傷來世悲傷兩世悲傷作惡業人見自惡業污濁不堪則更苦惱作善業者現世喜樂來世喜樂兩世喜樂作善業人見自淨業則更喜樂作惡業人現世受苦來世受苦兩世受苦作惡業人當苦歎言我作惡業作惡業人墮惡趣中受更大苦作善業人現世喜樂來世喜樂兩世喜樂作善業人當喜樂言我作善業作善業人生善趣中受更大樂有人作善語而不行之是放逸人非沙門列譬如牧人數他人牛終不能得牛乳五味有人少作善語但遵法行捨貪瞋癡住於正智心得解脫不執著現世來世如是之人真沙門列第二品不放逸品不放逸是不死道放逸是死道不放逸人如人未死放逸之人與死人同賢者住不放逸通達其理樂不放逸歡慕諸聖者所行之法智者常住慮念精進奮勵於苦行中得無上大般涅槃樂有大稱譽賢者能常住精進正念淨行熟慮調御住於正法住不放逸能達瀑流所不能侵害住所愚癡無慧之人耽於放逸賢者則護不放逸如護上寶汝等勿耽遊逸勿親欲樂以不放逸能住禪定得安樂故賢者於不放逸中制諸放逸制放逸已則登智慧閣無有憂惱見諸眾生多所憂惱亦見諸愚癡眾生如登高山見地上人有智之人見諸眾生多行放逸則不放逸眾生昏睡則自醒覺棄捨此諸眾生而自遠離譬如駿馬棄捨駑馬摩伽婆天住不放逸故於天中最為高勝賢者讚不放逸責放逸者註摩伽婆天即帝釋天比丘樂不放逸見放逸患則已燒盡大小繫縛如火燒諸火種是故比丘樂不放逸見放逸患則不退轉近於涅槃第三品心品智者能正直其常掙扎苛求反覆而難於制伏之心如箭匠之能正直其箭故瑜伽師在五欲水中持出此心投於禪觀之陸地遠離魔羅羂索如漁人在水中捕魚擲於陸地能制此難伏而隨於欲樂之心是大善聚以制伏之心能生安樂故智者應護極難見極微小隨於欲愛之心以有護之心能引安樂故有諸人等能制御遠行獨行無形隱於胸窟之心則此諸人當脫魔縛心不安定不明正法信念動搖則終不能成滿智慧能斷煩惱者災橫不侵心無貪染瞋恚超諸善惡是醒覺者族姓子應如是知身如水甕防心如守城以慧力戰魔守護禪觀勿有憂慮識既捨去身亦被棄橫臥於地如無所用之木賊酋對賊酋冤家對冤家互害互苦但心住邪惡其害其苦更甚於此父母不應作此親族亦不應作此心住於正道者應作更大之善人第四品花品誰能徹知地界誰能徹知閻摩界及以人界乃至天界誰能選集我所妙說法句有如智慧花匠選集諸花註徹知日譯本為征服佛教之行者能徹知地界能徹知閻摩界及以人界乃至天界佛教之行者能選集我所妙說法句有如智慧花匠選集諸花比丘知身如水泡身似陽燄截斷魔羅所贈之花則當達於死王所不能見之所死亡拘執諸著欲樂遊採香花之人正如瀑流漂去酣睡之家死亡降伏諸著欲樂遊採香花之人不飽於愛欲之人譬如蜜蜂採諸花味不令花色損智者到諸人家而行托鉢亦復如是不應著於不悅意語不應審觀他人既作未作之事應審觀自己既作未作之事色麗而無香之花猶如善語不行則無善果色麗妙香之花猶如善語行者得其善果花匠當於花堆中多造花鬘眾生生已應多造善花香不能逆風而揚栴檀香多揭羅香及迦藍婆香不能逆風而揚善人之香則能逆風而揚善人之香揚一切處戒香是香中最勝之香為栴檀香多揭羅香蓮花及末利迦香所不能及多揭羅香及栴檀香是輕微香持戒之香是最上香薰諸人天盡一切處魔羅不敢見具足戒行者不敢見住不放逸者不敢見正智解脫者悅心芳香之蓮花生於棄在道旁之塵埃堆積猶如正等覺佛陀之聲聞弟子在塵埃凡夫中對生盲凡夫揚智慧之光輝第五品愚品不眠者則夜長疲乏者則一由旬路長不知正法之愚者則輪迴流轉長人旅行時不遇勝己者不遇等己者則應奮勇獨行以愚者不可為友伴故愚者常苦惱謂我有子有財實則我已不是我所有何況有子有財愚者能自知是愚則可為賢者愚者自視是賢則真是愚者愚者終生親近賢者而不悟法譬如食匙不知羹味智人剎那親近賢者即悟正法譬如舌根即知羹味無知之愚者視自己為仇敵造作諸惡而受苦果人作不善業後受其苦哭泣流淚受其業報此則是作不善業人作善業後不受苦歡喜愉悅受其善報此則是作善業惡業未報前愚者視惡業為蜜但惡業報熟則受其苦惱愚者月月以拘娑草端取食終不能達聖法十六分之一註意指節食苦行終不能達四聖諦十六行相之一愚者作惡報尚未熟如新牛乳尚未變壞如火被灰覆但終必燒焚愚者愚者所思皆是無益令其慧滅白業亦滅愚昧比丘欲於比丘間獲大虛名得寺中高位及諸族姓家供養愚昧比丘常是思惟願在家出家二眾有所作為皆當以為有賴於我始能作為諸在家出家大小諸事應服從我是愚昧比丘嫉心慢心日日增長佛之聲聞比丘應行二行一為得利於道之行一為得入涅槃之行如是比丘則不悅樂人所供養而常增長寂靜第六品賢品人應視呵責我過罪者是令我得伏藏財寶之人應交如是有智賢者交如是賢者唯有上善之益無諸穢惡之害人喜訓誡人阻止人作不善事此為善人所愛為不善人所憎人不應友惡友不應友下劣人應友善友應友最上人法食者心境澄明愉適賢者常樂諸聖所說之法治水者治水箭匠矯箭木匠削木賢者調御自己純石之山不因風而動搖如賢者不因毀譽而動搖深池澄靜之水如諸賢者聞法之心善人遠離欲善人不語欲諸賢者對樂觸苦觸不形悲喜賢者不因自己而作惡不因他人而作惡不望得子不望得財不望得國土不望得非法之成就賢者有戒有慧具有正法人到彼岸者鮮眾生皆沿此岸行註彼岸即涅槃境此岸即生死輪迴人依善逝聖者所說之法而正行者則能越難越之魔罥到達彼岸賢者出家已住於無家棄黑法而修白法悅樂獨處棄捨諸欲無諸煩惱去心垢穢令己清淨人依菩提支分調心令正不執著樂於棄捨執著則能盡諸煩惱能出世間入大般涅槃第七品阿羅漢品旅途既終之人自無焦慮離於苦惱解脫一切斷諸縛著正念者常求出家不樂居家捨諸眷戀如彼雁鳥捨諸泥漿不事蓄積節食知量住空解脫無上解脫者其行難知如鳥飛空煩惱見執滅盡不依飲食住空解脫無相解脫之比丘其行跡難追如空中鳥跡諸根寂靜如馬師調御馬已我慢斷已煩惱滅已之比丘一切人天皆所羨慕比丘盡諸煩惱心如大地定如標木有戒無有泥土煩惱則無瞋恚如是安住比丘不受輪迴正智解脫之比丘心語意業安穩寂靜如實寂靜不妄信悟於涅槃斷於繫縛棄於欲望是為最上人阿羅漢住於村落住於森林住於低地高地如其所住皆是樂處人所不喜之森林則是樂處離欲之人樂於森林因無欲故第八品千品無益之一千語不如聞後得悟寂靜之一語無益之一千偈不如聞後得悟寂靜之一偈無益之語合成百偈不如聞後得悟寂靜之一偈人能戰勝百萬人不名戰勝者人能戰勝自己名為最上戰勝者註百萬人原文為一千人乘一千能勝自己者則已戰勝他人何况他人所戰勝之眾生天乾闥婆魔羅及諸梵天當令此能自調御能攝護諸根之戰勝者不再退敗供養有修持者一人乃至一瞬勝於供養其他諸人每月千金至於百年供養修行者一人乃至一瞬勝於供養在林中祭火百年祭火百年有何益處供犧祭祀以求福報雖供一年不如敬禮一直行者之四分之一敬禮直行者為最上勝註直行者即阿漢羅行對上人常敬禮柔順則壽命色身福樂諸力得以增上持戒修定者住世一日勝於污戒心意動亂者住世百年有慧有定者住世一日勝於無慧心意動亂者住世百年堅固精進者住世一日勝於怠惰不精進者住世百年見生滅之理者住世一日勝於不見生滅之理者住世百年見不死之道者住世一日勝於不見不死道者住世百年見最上法者住世一日勝於不見最上法者住世百年第九品惡品人應急作善應離惡心以怠於作善則心樂於惡故人作惡已不應再作不應樂所作惡以積集惡則招苦果故人作善已應常作之應樂作之以積集善則招樂果故惡人在惡果未熟前見惡為善但惡果熟時乃見是惡善人在惡果未熟前亦能見惡人不應輕視小惡以為無報水瓶能以一滴一滴之水而能盈滿亦如惡人積集小惡而令惡滿人不應輕視小善以為無報水滴雖小能令瓶滿賢者積小善亦能令善滿比丘應遠離惡如少伴侶而有多財寶商人遠離危道又如愛命遠離毒藥如手無瘡可捉毒藥無瘡之手毒不能侵諸不作惡者惡不能侵加害於不害人者清淨者無煩惱者則其惡當反及加害者猶如逆風揚塵塵則反及揚塵者有人當再宿胎胞再生死有人造惡當墮地獄有正念者生天滅煩惱者當證大般涅槃在虛空中在大海中在山窟中在人所住大地欲求避免業之果報究不可得在虛空中在大海中在山窟中在大地上欲求死不能侵不死究不可得第十品刑害品比丘應自籌量一切眾生皆怖刑害一切眾生皆怖死亡故不應自手殺不教他殺比丘應自籌量一切眾生皆怖刑害一切眾生皆愛自命故不應自手殺不教他殺為求自己安樂而刑害其他眾生安樂者來世不得安樂為求自己安樂而不刑害其他眾生安樂者來世則得安樂不得對人作粗暴言以人將如是答覆汝故忿怒之言必有苦果刑害報復亦將及汝若汝默如壞鑼則得涅槃無人忿汝牧者以杖驅牛到於牧場猶如老死驅眾生命無智愚者作惡不悟後受苦惱乃知是己造作如被火燒侵害無刑害心之修行者無刑害人業者當驟得以下十苦之一苦痛失財身體毀損重病心念錯亂王難被誣親族離散資產破滅或遭火難死墮地獄裸形修行螺髻眠臥泥中斷食地上橫臥塵垢塗身蹲踞修行如是修行不能斷疑而達清淨莊嚴其身寂靜調御自制修最勝行不害一切眾生平等行持如是則名為淨行者名為沙門名為比丘以慚愧制伏惡念者於世不多常醒少睡如良馬畏鞭則甚難得良馬被馬師鞭則加奮勵汝等應當精勤警覺汝等應具信戒精進禪定知法明行具足能以正智滅無量苦治水者導水箭匠矯箭木匠削木有德者調御自己第十一品老品世間如焚有何可喜有何可樂汝在暗中何不求燈汝當自見夙業所飾身如瘡傷三百片骨所持病患不息眾所共知不能久住此身衰老病之巢窟朽壞污穢將就毀滅而終必死人死所委棄之白骨如秋葫蘆色如鴿子見此白骨有何可喜身是業造有如骨城肉血塗飾是老死慢偽之所住處美麗王車終歸朽弊肉身亦然善人之法則不老朽善人善人相傳不絕寡聞之人如老牡牛肉有增加智無增加求造屋人而尚未得流入輪迴生生相繼受苦不已造屋者人我今見汝汝今不必再造我已斷汝椽柱拆汝屋頂我心已達涅槃離一切行斷諸愛欲愚者壯時不修梵行不獲財寶當自毀滅有如老鷺在無魚池而自死滅愚者壯時不修梵行不獲財寶當自歎息如弓已折第十二品自己品若知自己可愛應護自己令其為善賢者應於夜間三分以一分時資助自己人先安住於德後乃訓誨他人而賢者亦不應苦惱未修德而誨人比丘若能行自所訓誨他人如是比丘名調御己調御他人自己最難調御自己即自己之所依他人有何可依自己能調御自己則不必求得所依愚者所作惡業生於自己自己是惡之源而毀滅自己譬如金剛能碎諸珠污戒之人覆束自己如蔓藤覆束娑羅樹以至樹枯死污戒人如賊首望得任大賊首不善業及無益己業易行善業及有益己業極難行劣智惡見者違背應供聖者住於正法之佛陀教誡如是違背殺滅自己猶如幼竹殺滅竹死註竹日譯本為葦蘆草類原文為迦陀他迦巴泰字典註為竹自己作惡自己污惱自己不作惡自己清淨淨及不淨乃自己事他人不能代淨他人雖有大責任不應減少自己之責任既知自己之責任應專精責任註責任日譯本為義務原文為所需所欲利益第十三品世間品人不應從下劣法不應放逸不從邪見不作世間所厭惡之人比丘不應放逸而摶食應行善行行善法之人此世來世皆得安樂應行善行勿行惡行行善法者此世來世皆得安樂見世間如水泡如陽燄則死亡王不能見比人世間粉飾美麗如王者車愚者沉湎於中有智人則不著之前嘗放逸而後能不放逸猶如月出雲間光明遍照作惡之人能以善業覆蓋而棄捨惡則如月出雲間光明遍照世間世間暗黑能洞知者甚少眾生能生天者甚少能如脫網之鳥者甚少天鵝飛向太陽有神通者在空中來往賢者勝諸魔羅及其坐乘得脫世間註坐乘日譯本為眷屬人犯妄語重戒來世必作惡貪者不能生天愚者不讚揚布施賢者則隨喜布施而此隨喜令其來世獲得安樂預流果須陀洹果勝於地上國王勝於生天勝於一切世界之主第十四品佛陀品正等覺佛陀既勝諸具煩惱者已終不退敗正等覺佛陀既勝諸具煩惱者已煩惱終不能追及正等覺佛陀既證正覺已智見無邊無有踪跡不知去跡愛欲羅網不能令正等覺佛陀再入於生死輪迴正等覺佛陀既證正覺已智見無邊無有踪跡不知去跡佛陀正念禪定是大賢者常樂出家寂靜自居是大智者為人天之所敬慕得人身難人間活命難聞妙法難值佛出世難諸惡莫作眾善奉行自淨其意是諸佛法忍受即忍辱是最上苦行諸有智者以涅槃為最勝法侵害眾生者不名為出家沙門不誹罵不殺持戒節量而食靜處坐臥精勤正念是諸佛法雖天雨金亦不能滿足欲心欲心少樂又是大苦賢者如是知已故不欲樂雖有天欲亦不樂之佛正等覺者之弟子樂於滅斷愛欲之法人被苦難驅迫多往山嶽森林園苑依住但所依處非安穩處非最上處不能脫難唯歸依佛法僧則見四聖諦即見苦苦之因苦之滅滅苦八聖道之妙慧如是依所是安穩處是最上處離一切苦聖者難值不隨處生所生族姓其族姓亦得安樂諸佛所示生處即有福樂正法亦帶來福樂僧眾亦帶來福樂僧眾之精進修行亦帶來福樂供養離諸虛妄能越諸憂患之佛陀或佛之弟子其福無能計算不可數供養寂靜者涅槃者隨處無所怖畏者其福無有能為計算第十五品安樂品人互怨結我無怨結我真安樂人有苦惱我無苦惱我真安樂人有貪欲我無貪欲我真安樂我無煩惱我無憂慮食法喜食如光音天極光淨天食勝者則有怨結敗者則有苦惱寂淨之佛弟子捨棄勝敗故得安樂火莫大於貪火惡莫大於瞋恨苦莫大於五蘊之苦安樂莫樂於寂靜飢餓是大病諸行是極苦賢者如實知己當悟證於涅槃以涅槃是極樂故無病為無上之利知足為無上之財互信為無上之親涅槃為無上之安樂樂善法者飽靜處獨居寂靜之味自無怖畏離諸罪惡能見諸賢者名為善能與諸賢者同住則常安樂不見愚人亦常安樂與愚者同行則長時憂苦與愚者共住則常受苦以與仇敵共住故與賢者共住則如與親族共住以此之故人必交賢者智者多聞者忍者持戒者聖者淨人如是賢人如月統治眾星第十六品愛好品人作不應作事不作所應作事棄捨善道愛著眾生及色身亦愛如是愛著之人人與愛著者或所不愛著者交而不知與愛著者或所不愛著者交同皆是苦以此之故人不應裝飾造作眾生及自色身令其可愛以失去愛著眾生及自色身則災惡及諸煩惱不能繫縛以無憎無愛故憂患生於所愛著之物怖畏生於所愛著之物而憂患不生於解脫愛著之人怖畏亦無所生憂患生於愛情怖畏生於愛情而憂患不生於解脫愛情之人怖畏亦無所生憂患生於婬欲怖畏生於婬欲而憂患不生於解脫婬欲之人怖畏亦無所生憂患生於欲樂怖畏生於欲樂而憂患不生於解脫欲樂之人怖畏亦無所生憂患生於愛欲怖畏生於愛欲而憂患不生於解脫愛欲之人怖畏亦無所能生人應具足戒行正見住於正法實語知所應作而為人所喜愛比丘應喜樂不可說之涅槃樂正念不著諸欲我說如是比丘是上流者近涅槃者親族朋友知己對遠居異地久別歸來之人無量喜悅猶如福業對作福者在此世而往他世之歸來無量喜悅第十七品忿怒品人應棄捨瞋忿人應棄捨驕慢人應脫去一切繫縛則苦不能尾隨其人人不執著名色則無煩惱憂慮註名色日譯本為物質及精神人能制止猝怒如制止車行我說是人是真御者他人則唯手執索而不能制車以不忿怒忍辱克服忿怒以善克服不善以布施克服慳吝以誠實語克服妄語說誠實語不忿怒雖有少數財物亦樂施與人因此三事而能生天賢者不殺生常攝護自身則當得住於無憂患而不死於境界常覺醒者盡夜力學者志趣涅槃者皆無煩惱佛告阿杜羅優婆塞誹謗或讚譽古已有之非今時有人誹謗默坐者誹謗多言者誹謗節言者人唯被誹謗或唯被讚譽過去無有未來亦無有智者愚者之判別在於智者常讚無過失者安住戒慧者有誰謗美如閻浮提金幣之人天所稱讚之人梵天所稱讚之人比丘應攝護大慢之身應制御身棄捨身之惡行修身善行應攝護大慢之語應制御語棄捨惡行語修語善行應攝護大慢之心應制御心棄捨惡行之心修心善行賢者制御其身制御其語制御其心如是諸賢者已制御己第十八品垢穢品汝正如枯黃葉閻摩羅王之使者亦正近汝汝正在衰敗之門旅路之糧食汝亦無有汝當求歸依之所勇猛精勤力為賢者拂除垢穢罪惡者無有煩惱則汝當能到天界汝已是老年正在到達閻羅王所旅程之住宿及糧食汝亦無有汝當求歸依之所勇猛精勤力為賢者拂除垢穢罪惡者無有煩惱則不再有生老之苦賢者作小小善剎那不停漸次除斷垢穢如金匠鍛金金垢漸盡鐵自生銹既生銹已而毀其鐵如人造業造惡業已自落惡趣經典以不讀誦為垢穢住屋以不勤淨為垢穢身體美潔以懈怠為垢穢行者以放逸為垢穢女人以邪見為垢穢施者以吝嗇為垢穢一切法以邪惡為此世及來世之垢穢我告汝等垢穢之最無甚於無明諸比丘應棄捨諸垢穢作無垢穢者無慚無愧剛愎暴戾傲慢獨前之罪垢活命行之甚易有慚有愧常求清淨不退失不傲慢之清淨活命行之甚難人若殺生偷盜姦犯他人妻妄語常常飲穀酒菓酒是為已棄捨自己現世之財藏諸善男女應如是知不節制惡行貪欲及非法將陷汝等於無盡時苦汝勿作之人因諦信敬仰而施與若受施人對他人所施之飲食歉疚不安則無論晝夜不得入於三昧人能斷除根絕如是歉疚不安則晝夜能入三昧火無甚於貪欲追捉無甚於忿怒羅網無甚於愚癡河流無甚於愛欲他人之過失易見自己之過失則難見以人散布他人之過失如播米穀而隱匿自己之過失如獵禽者以樹枝掩蔽自身尋求他人之過失則自己之煩惱日增不諒人過則離斷除煩惱之道愈遠外道無沙門法虛空無足跡眾生喜悅虛妄諸如來無虛妄之法註虛妄泰譯本為蹉跎外道無沙門法虛空無足跡諸行無常佛陀無有令眾生煩亂之法註行日譯本為萬象第十九品法住品躁急分別事理則為非法住者賢者則不躁急而分別事理不躁急而如法分別他人之是非名護法者是賢者我稱之為法住者人不因多言而名為賢者心境平靜無有怖畏我稱之為賢者人不因多言而名為持法者聞法少而能見法名身於法不放逸是名持法者人不因髮白而而名為長老年齡多而衰老我稱之為空老徒然之老諦實正法不害不殺生自制調御而心垢既謝者則是賢者我稱之為長老嫉妒慳貪虛偽多言容色之美不得稱之為端正之人能斷嫉妒等惡而拔去其根源者是人罪惡已謝是有慧人我稱之為端正之人人不因剃髮而名為沙門破戒妄語多欲多貪如何可名沙門人能壓伏一切大小諸惡我稱是人是真沙門以能壓伏惡業故註壓伏泰譯本為寂靜人不因托鉢乞食而名為沙門受持有毒法有害之事理不名為沙門人能棄捨現世諸法修持梵行知一切法行化世間我稱是人是真沙門人不因默然無語而名為寂默者愚昧無知不名寂默者註寂滅者原文牟尼亦譯賢者執最勝法如權衡者離一切惡是名寂滅者以有如是因故名寂滅者人能知二世名為寂默者註二世日譯本為善惡人不因侵害眾生而名為聖以不侵害眾生名為聖者故比丘當知比丘未滅盡煩惱勿輕忽戒律戒行多聞禪定獨臥勿自命為已出家學道已得凡夫所不能得之安樂第二十品道品諸道之中八支道八聖道分最勝諸諦之中聖佛陀之四句四聖諦最勝諸法之中離欲法最勝一切具眼之二足眾生及一切無色法佛眼最勝唯此最能具諸淨見更無他道汝當依之而行以此道是魔王魔軍所不見汝等故註不見日譯本為幻滅汝行此道必能熄苦我如實知此道是除欲道如拔箭出我已告汝汝當勤除熱烈煩惱諸佛如來唯能示道有觀有伺者得脫魔縛註觀伺日譯本為禪定人能以慧觀諸行是無常時則當厭離於苦此是淨道人能以淨觀諸行是苦時則當厭離於苦此是淨道人能以慧觀諸法無我時則當厭離於苦此是淨道人在壯年不依起身時起身流入懈怠是名懈怠人懈怠之人不得慧道人應慎言語善調御意身不作惡淨三業道悅樂聖仙佛所說之道慧如大地因行耕種而能生慧如大地因不行耕種而不生賢者知此二道當自令慧生註大地日譯本為瑜伽冥想汝等當伐林但莫伐樹怖畏生於林比丘當知汝等伐林及叢木已則是無林人男子對女子之欲情雖少小如林中之叢木但未斬伐則其心縛著女子如犢牛縛著母牛之乳註林日譯本作欲林叢木作欲叢汝當自斷愛欲如自手折斷秋季之蓮華汝當專精寂靜之道佛善逝所說之涅槃愚者自作愚思雨季我當住於此處冬季及夏季我當住於此處愚者不知死亡將捉去惑戀其兒子家畜財產及多執著者猶如瀑流漂去酣睡者之家人既被死亡捉去則諸兒子不能救父親不能救一切朋黨不能救一切親戚亦不能救賢者既知此義當攝護戒律急趣清淨涅槃之道第二十一品雜品賢者若見捨小樂而得大樂賢者見已即棄小樂而取大樂人為己樂而令人苦則受怨憎縛執永不能脫去他人怨執有諸比丘應作而不作不應作而作如是比丘煩惱增長我慢如蘆草之生長是放逸者比丘常作身念勤作所應作不作所不應作如是正念比丘能斷盡煩惱如婆羅門能殺母愛欲能殺父我慢能殺二王斷見常見能殺一國十二處及諸臣眾貪則成為無苦之人如婆羅門能殺母父愛欲我慢能殺二婆羅門王斷見常見能殺如虎之第五障蓋之疑障蓋則成為無苦之人註母父國王國土等喻為古印度之一般譬喻註十二處眼耳鼻舌身意等六根及色聲香味觸法等六塵註五蓋貪欲瞋恚睡眠掉悔疑人能晝夜常念佛如是之人名瞿曇釋迦佛之姓弟子常覺醒隨時善覺醒人能晝夜常念法如是之人名為瞿曇弟子常覺醒隨時善覺醒人能晝夜常念僧如是之人名為瞿曇弟子常覺醒隨時善覺醒人能晝夜常念身如是之人名為瞿曇弟子常覺醒隨時善覺醒人能晝夜常喜樂不侵害如是之人名為瞿曇弟子常覺醒隨時善覺醒人能晝夜常喜樂靜慮如是之人名為瞿曇弟子常覺醒隨時善覺醒能出家難心樂出家活命難不善之在家引來眾苦與不同等人不修持共住引來眾苦為有苦尾隨之遠行者生死輪迴故人不應遠行不入生死輪迴人不應有苦尾隨勿有苦報族姓子有信具戒名譽財產無論行住何處則受當處諸人尊敬善人雖居遠方亦如雪山希馬拉雅山之可令人見不善人雖坐於此處亦如夜間射出之箭不能得見人不願見比丘應獨坐獨臥不懈怠獨行自調御心樂森林第二十二品地獄品不說實語者必墮地獄作惡而言不作惡者亦墮地獄此二種惡人死後同等同入地獄人多有以袈裟纏頸而行惡法不攝護諸根是惡劣人以惡業故必墮地獄食火燄灼熱之鐵丸勝於破戒人不攝護諸根而食各方所供養之摶飯放逸人犯他人妻則得四事即一不得福二不得安睡三被責謗四墮地獄彼不得福故墮惡趣國王刑罰亦酷故不應犯他人妻男女怯於婬樂者少執茅草不得法者則傷手沙門不行善行必入地獄怠忽之行污穢之戒行厭惡梵行無有大果若真為沙門則應勇猛而行懈怠之沙門必多欲塵不作惡為勝以作惡必苦惱故善則應作以將來無苦惱故汝當自護如守護邊城內外一剎那不可忽過以忽過一剎那者則已在地獄門擁擠受憂患故邪見之眾生羞人之所不羞不羞人之所羞當墮惡趣邪見之眾生以無罪為有罪以有罪為無罪當墮惡趣正見之眾生見罪是罪見無罪是無罪當生善趣第二十三品象品註原文那伽譯義龍或象此處義多指象故譯象我將堪忍誹謗如戰場之象堪忍箭射因破戒之人喜謗人故人輒用既經調御之獸赴戰場集合會戰帝王則乘調御之象在人間既經調御者堪忍誹謗者是人中最勝人獸師所調御之名馬駿馬信度馬及大良象是最勝獸若人能自調御者則較諸騎乘為最勝註信度印度產駿馬之地名人自調御已則能達未調御者所不能達之境猶如人不能以未嘗達彼境之騎乘而達彼境他那波羅迦象當暴醉時顳顬春情之過度分泌液人難制伏必縛繫之象被縛繫則不食食而繫念眾象所住之象林人多食則常疲倦睡眠輾轉橫臥猶如大豕被飼餌食此是愚者當數數入房註入房即入胎胞亦即生死輪迴此心從前依隨求依隨欲依隨樂徘徊遊行今我將以微妙方便制之猶如象師持鈎制御醉象汝等當喜樂不放逸守護自心自拔出所難拔出之煩惱坑中猶如陷在泥中之象自拔而出於泥人若能與有慧者行正業者賢明之人同行則能免諸危難喜樂熟慮而同行人若不能與有慧者行正業者賢明之人同行則應獨行猶如帝王棄其所征服之國土亦如摩丹伽象棄象羣而獨遊林中獨行最勝因愚者不可為友故人應獨行猶如少欲不作惡之摩丹伽象林中獨行有所需時諸友導來喜樂能隨意滿足時導來喜樂命終時善業導來喜樂能棄一切苦時導來喜樂供護母親導來世間喜樂供護父親導來喜樂供護沙門導來世間喜樂供護婆羅門導來世間喜樂持戒導來直至老年之喜樂安住正信導來喜樂獲得智慧導來喜樂不作一切惡導來喜樂第二十四品愛欲品愛欲生長於放逸之人如蔓草之生長故彼人必從生至生漂流無已猶如尋求果食之猴漂流林中暴惡之愛欲侵入世間一切心境被制伏者即長憂患猶如雨後比羅那草林中增長人能降伏世間最暴惡難伏之愛欲則其人之憂患脫落猶如蓮葉上水滴之脫落水不能著故我常告汝等來此集會者當造善業掘去愛欲之根猶如掘取烏尸羅香之人先掘去比羅那草如是則魔羅不能常侵汝等猶如流水不能常侵蘆葦註比羅那草之根即烏尸羅香木樹根無害則樹能固立雖被斬伐亦能再生人若不拔去愛欲則流轉生死之苦生生不息因貪欲而生一切喜樂令愛欲如三十六瀑流奔向欲樂漂入邪見註三十六流即內外各十八愛欲愛欲之流水流遍一切心境如蔓草之生長茂盛汝等若見愛欲蔓芽生長應以智慧伐斷其根眾生有因喜悅之熾盛而又戀著者如是眾生則耽於歡樂求於世樂如是之人必再生老眾生被愛欲圍困已彷徨不安有如兔之羅網彷徨不安眾生著於輪迴著於諸法於長時中常受苦惱眾生被愛欲圍困已彷徨不安有如兔之羅網彷徨不安以此之故比丘志求離欲應除愛欲汝等當見無煩惱人如欲林之無叢木有人既離欲林已而心向欲林仍趣入欲林如是之人則是已脫繫縛而願再受繫縛者諸賢者告言鐵鍊之繫縛木桎梏之繫縛草繩繫縛非堅牢縛眾生戀著一切寶石寶珠珠璫及妻子之罣慮賢者告言此是下墮之繫縛人所難脫是堅牢繫縛諸智者斷繫縛已無有罣慮棄捨欲樂而離輪迴註輪迴日譯本為出家眾生被貪欲染著已則隨欲流而去如蜘蛛隨自己所結之網而行智者斷如是縛已無有罣慮斷一切苦汝當放下戀著過去之蘊放下戀著未來之蘊放下戀著現在之蘊則為達彼岸者心離一切有為法者不再入於生老生死疑惑則增長貪欲之侵擾愛欲熾盛以世樂為美好如是之人令繫縛堅牢止息疑惑樂住禪定常有智慮作不淨觀如是之人能斷貪欲能斷魔縛比丘成就已無有畏怖遠離愛欲無有煩惱斷除入生死之箭如是比丘此生是最後生更無生死輪迴比丘離諸愛欲不著愛欲通達經典句義初後順序文字如是比丘是最後身有大智慧是大丈夫我已伏一切法徹知一切法離一切惡法此是自悟更能稱誰為師一切施中法施最勝一切味中法味最勝一切樂中法樂最勝能滅貪欲滅一切苦一切財產殺少智者殺不求彼岸者少智之人能殺自己猶如因財而殺人者一切田因草而損一切眾生因貪欲而損以此之故施諸離貪者得大果報一切田因草而損一切眾生因瞋恚而損以此之故施諸離瞋者得大果報一切田因草而損一切眾生因愚癡而損以此之故施諸離癡者得大果報一切田因草而損一切眾生因欲望貪求而損以此之故施諸離欲望貪求者得大果報第二十五品比丘品攝護眼是善攝護耳是善攝護鼻是善攝護舌是善攝護身是善攝護語是善攝護意是善攝護諸根是善能攝護諸根之比丘能脫一切苦攝護手攝護足攝護語攝護自己內心悅樂住於三昧獨住知足賢者說言如是之人是真比丘比丘攝護口常慧說語心不放逸則此比丘能如理說悅語之妙法比丘因樂法而來出家已樂法已隨順於法思惟於法則不退墮於法比丘不輕自己所得不羨他人所得若比丘羨他人所得則不能入於三昧若比丘所得雖少而不自輕諸天當共讚言是住正命不懈怠之比丘若人不執名色為己有不因名色而憂戚我說是人是真比丘比丘常住於慈正信佛教如是比丘當能悟證寂靜息止諸行而得安樂比丘當知汝等當汲去舟中之水則舟能疾行汝等能斷貪欲瞋恚則達涅槃比丘應斷五下分結五上分結勤修五根比丘越五著已則能渡煩惱暴流註五下分結欲界之貪瞋身見戒禁取見疑五上分結色界貪無色界貪掉舉慢無明五根信勤念定慧五著貪瞋癡慢見比丘當修禪定不放逸心不隨愛欲轉汝莫因放逸而致吞食地獄之熱燒鐵丸悲哀號苦無慧者無禪無禪者無慧有禪有慧之人近於涅槃住於空室寂靜之比丘有凡夫所未有之安樂其心寂靜明見諸法若比丘能隨時觀伺諸蘊生滅則能隨時歡喜悅樂歡喜悅樂善法是一切賢者之永生明見諸法攝護諸根知足而住守護戒律是有慧比丘之最初戒法汝當事善知識良友清淨正命無懈怠心比丘當尚友誼有善慧行多有悅樂以善知識及慧行能滅苦故比丘汝等當棄貪欲瞋恚如末利迦花之振落萎花比丘能身寂靜語寂靜意寂靜住於三昧棄捨世樂我說是比丘是寂靜者能自策勵能自省察如是比丘則已能自攝護能住正念能得安樂自己應仗自己自己應規自己以此之故汝等當自攝護如商人之攝護良馬比丘應多悅樂法正信佛教證悟諸行寂滅寂靜之門年少比丘精勤佛法如是比丘能令世間明耀如月離雲第二十六品婆羅門品婆羅門汝當斷愛欲之流捨去諸欲婆羅門若汝知滅斷諸行則當知涅槃是無作無為之法婆羅門若能以二法止觀到達彼岸則此明見婆羅門已滅煩惱無彼岸此岸之人我說是人無諸怖畏無諸繫縛名婆羅門住於禪定無有垢穢獨自安坐所作已辦無有煩惱達最上義名婆羅門晝則日明夜則月明剎帝利則嚴裝有威婆羅門則住禪定而自莊嚴佛陀則晝夜光明輝煌無惡業人我名之為婆羅門我稱之為沙門因其所行寂靜故能自除垢穢我稱之為出家者以其能自除垢穢故娑羅門不應打害婆羅門婆羅門不應執怨婆羅門我責彼打害婆羅門之人我責彼執怨婆羅門之人但不甚於前二者婆羅門能制止心所愛著則利益不少侵害之心既滅則苦惱滅我說無身語意之惡業者三處之攝護者是婆羅門聞正等覺佛陀所說法已而明見法者應禮敬之如婆羅門之禮敬祀火祭者人非因螺髻因族姓因姓氏而名為婆羅門有諦實有法而清淨者其人是婆羅門諸無智者汝修螺髻有何所益汝著鹿皮衣有何所益汝內心荒蕪如密林汝唯清淨外表之身註鹿泰譯本為麝我說著糞掃衣破弊之衣身軀瘦削脈管外露勤修禪定住於森林者是婆羅門我不說因其母胎而稱之為婆羅門彼稱為婆和帝實則是具煩惱執著者我說無煩惱而不執著者是婆羅門我說能斷一切結縛無諸怖畏超越執著無作無為者是婆羅門我說能斷瞋恚之紐能斷愛欲之緒能裂邪見之網乃至能斷無明之索已解脫無明之閂已悟證者是婆羅門我說不打害者能忍罵詈捶打刑縛有安忍力者有安忍軍兵者是婆羅門我說不瞋恚有德持戒無熾盛煩惱已調御已得最後身是婆羅門我說不染著諸欲如水之不著蓮葉如瞿栗粒之不著鐵錐尖端者是婆羅門或說能於戒法中明悟滅苦捨諸重擔離於繫縛者是婆羅門我說有深智慧是有智者明見道與非道者得最上義者是婆羅門我說不友在家出家無戀著遊行山林而少欲者是婆羅門我說不刑杖怯弱眾生不自手殺不教人殺者是婆羅門我說不害於害己者不思報復刑杖於己者不著於蘊者是婆羅門我說能脫落貪欲瞋恚慢覆虛偽如瞿栗粒之脫落鐵錐尖端者是婆羅門註瞿栗粒據日譯本泰譯本則指芥類及羅蔔類我說不粗暴語者明語者實語者不兩舌者是婆羅門我說於世間一切有主之物長者短者少者多者美者不美者主人不與則不取是婆羅門我說於現世及未來世無欲求無愛欲無煩惱者是婆羅門我說無執著無疑惑漸次到達不死者是婆羅門我說棄捨善惡超越現世煩惱無有憂慮垢穢而清淨者是婆羅門我說現世快樂清淨明潔無暗翳者如明月之無垢是婆羅門或說能越泥濘難行路徑生死輪迴能越愚癡者能達於彼岸者住於禪定無欲無疑惑無執著者是婆羅門我說棄捨現世欲樂者棄家遊行滅盡貪欲滅盡後有者是婆羅門我說能棄人間繫縛脫天界之繫縛離一切之繫縛者是婆羅門我說能棄捨樂及不樂無有煩惱之勇力者是婆羅門我說能遍知一切有情生起不執著善逝證悟者是婆羅門我說諸天乾闥婆及人所不能知其趣煩惱滅盡證阿羅漢者是婆羅門我說無過去蘊之焦慮無未來之焦慮無現世之焦慮無有焦慮無有執著者是婆羅門我說強健最勝勇猛已勝得大德無欲洗滌煩惱已覺悟者是婆羅門我說能知夙世已見天趣及惡趣已不再生梵行圓成是牟尼者是婆羅門法句經終第三自說經歸命應供正等覺佛世尊第一品菩提品第一菩提經一如是我聞一時世尊初成正覺在優樓比螺村尼連禪河畔菩提樹下住爾時世尊單跏趺坐享解脫樂經七日已乃從定起於初夜分順觀緣起諸法謂此有故彼有此生故彼生即無明緣行行緣識識緣名色名色緣六入六入緣觸觸緣受受緣愛愛緣取取緣有有緣生生緣老死憂悲苦惱愁歎如是苦聚如是而生爾時世尊如是知已而自說言諦修禪觀之婆羅門悟諸法緣起時彼諸疑惑即能銷盡以悟諸法如是因生故菩提經一終第二菩提經二如是我聞一時世尊初成正覺在優樓比螺村尼連禪河畔菩提樹下住爾時世尊單跏趺坐享解脫樂經七日已乃從定起於中夜分逆觀緣起諸法謂此無故彼無此滅故彼滅即無明滅緣行滅行滅緣識滅識滅緣名色滅名色滅緣六入滅六入滅緣觸滅觸滅緣受滅受滅緣愛滅愛滅緣取滅取滅緣有滅有滅緣生滅生滅緣老死憂悲苦惱愁歎滅如是苦聚如是而滅爾時世尊如是知已而自說言諦修禪觀之婆羅門悟諸法緣滅時彼諸疑惑即能銷盡以悟諸法如是緣滅故菩提經二終第三菩提經三如是我聞一時世尊初成正覺在優樓比螺村尼連禪河畔菩提樹下住爾時世尊單跏趺坐享解脫樂經七日已乃從定起於後夜分順觀逆觀緣起諸法謂此有故彼有此生故彼生此無故彼無此滅故彼滅即無明緣行行緣識識緣名色名色緣六入六入緣觸觸緣受受緣愛愛緣取取緣有有緣生生緣老死憂悲苦惱愁歎如是苦聚如是而生無明滅則緣行滅行滅緣識滅識滅緣名色滅名色滅緣六入滅六入滅緣觸滅觸滅緣受滅受滅緣愛滅愛滅緣取滅取滅緣有滅有滅緣生滅生滅緣老死憂悲苦惱愁歎滅如是苦聚如是而滅爾時世尊如是知已而自說言諦修禪觀之婆羅門悟諸法時彼婆羅門能破魔及魔軍眾如日破暗照明太空菩提經三終第四牧羊者尼拘律林經如是我聞一時世尊初成正覺在優樓彼螺村尼連禪河牧羊者阿闍波羅尼拘律林住爾時世尊單跏趺坐享解脫樂經於七日乃從定起爾時慢性憍慢成性婆羅門來至佛所坐近於佛共相問訊得紀念已而問佛言最勝瞿曇何故名婆羅門云何是成就婆羅門法爾時世尊如是知已而自說言婆羅門除邪惡已心無憍慢無有煩惱汙垢自攝護已通達吠陀住盡梵行隨一切世無有煩惱憍慢如是婆羅門名正法婆羅門牧羊者尼拘律林經終第五長老經如是我聞一時佛在舍衛城祇陀林給孤獨長者園住爾時舍利弗尊者大目建連尊者大迦葉尊者大迦旃延尊者大拘致羅尊者大劫賓那尊者大純陀尊者阿㝹樓那尊者離越尊者難陀尊者來至佛所世尊遙見諸尊者來即召諸比丘言諸比丘彼等婆羅門來爾時一婆羅門族姓比丘即問世尊大德世尊何故名婆羅門云何是成就婆羅門法爾時世尊如是知已而自說言除邪愚已常住正念生死縛盡已覺悟已如是之人名現法婆羅門長老經終第六大迦葉經如是我聞一時世尊在王舍城竹林迦蘭陀迦園住爾時大迦葉尊者在七葉窟中病篤甚苦後病癒自思我當往王舍城托鉢爾時五百天眾請大迦葉尊者托鉢受食大迦葉尊者已却諸五百天眾供食已即於朝時著衣持鉢入王舍城向貧乏人住處孤獨人住處織工匠住處托鉢爾時世尊見大迦葉尊者在王舍城向貧乏人住處孤獨人住處織工匠住處遊行托鉢爾時世尊知是知已而自說言我說受他人供食能徹知能自調御能住於法煩惱已盡罪惡已除名婆羅門大迦葉經終第七波吒經如是我聞一時世尊在波吒城羊羣夜叉阿闍迦羅波迦住處羊羣塔住爾時世尊於夜暗大雨中在露天坐爾時羊羣夜叉欲令世尊怖畏恐懼身毛為竪即來見佛於不遠處而大聲呼阿迦拘羅波迦拘羅阿迦拘羅波迦蘭如是三次而後告言沙門汝見惡鬼爾時世尊如是知已而自說言人能自達諸法彼岸已是婆羅門無有怖畏如是諸惡鬼及波迦拘羅聲註阿迦拘羅波迦拘羅等聲是威嚇怖人之聲波吒經終第八戰勝經如是我聞一時世尊在舍衛城祗陀林給孤獨長者園住爾時戰勝尊者來舍衛城欲禮世尊時尊者舊妻在俗時之妻聞戰勝尊者來至舍衛即抱其子赴祗陀園爾時戰勝尊者日中休息在樹下坐戰勝尊者舊妻即往見之告尊者言沙門汝當養我我有此子舊妻說已戰勝尊者默然不語舊妻再說乃至三說而又復說沙門汝當養我我有此小子戰勝尊者默然不語爾時舊妻即抱小子置尊者前而便說言沙門此是汝子汝當養之說已却去爾時戰勝尊者不視此兒亦不與語尊者舊妻遠處俟觀遙見尊者不視此兒亦不與語即自思惟此之沙門無有所欲即來抱子而去世尊以清淨天眼超諸人眼見戰勝尊者舊妻如是行已爾時世尊如是知已而自說言不歡舊妻之來不悲舊妻之去彼戰勝者已離愛著是婆羅門戰勝經終第九結髮經如是我聞一時世尊在伽耶城象頭山住爾時諸結髮外道修行者等眾在伽耶河中或浮或沉或時浮沉或水自淋或祭祀火時是冬夜大雪續降經於八日諸結髮等自思作此可得清淨爾時世尊見諸結髮在伽耶河或浮或沉或時浮沉或水自淋或祭祀火時是冬夜大雪續降於時八日自思作此可得清淨爾時世尊如是知已即自說言清淨不因水而得彼在此水中者若有諦實有正法即能清淨即是婆羅門結髮經終第十婆希經註希應作醯為求通俗今易為希如是我聞一時世尊在舍衛城祇陀林給孤獨長者園住時族姓子名婆希是樹皮衣修行者住於蘇波羅迦海岸人所尊重承事供養恭敬多得衣服飲食坐臥具醫藥時婆希坐於僻處自憂念言我是阿羅漢是證羅漢道中之一人否時婆希夙世兄弟而生天者是扶濟者是利益者知婆希心之所念來見婆希而告之言婆希汝實不是阿羅漢亦非證阿羅漢道汝無修阿羅漢行亦無修證阿羅漢道之行婆希問言如是現前誰是人天世界之阿羅漢證阿羅漢道者彼天答言婆希北方有城名曰舍衛彼應供正等覺佛陀世尊住於此城婆希彼世尊者實是阿羅漢是證阿羅漢道者正說成阿羅漢法時婆希為天所動即離蘇波羅迦河岸詣舍衛城祗園精舍經一夜宿而到佛所時比丘眾正在露處經行婆希即問比丘眾如是問言諸大德婆伽梵應供正等覺佛陀世尊今在何處我欲禮敬於彼應供正等覺佛陀世尊比丘眾答言婆希彼世尊入城托鉢時婆希即疾出祗園入舍衛城見世尊在舍衛城內次第托鉢甚可皈敬應為皈敬諸根寂靜正念堅固已調御已最極寂定有自調御有自攝護守護諸根是大德者註日譯本大德譯為龍象婆希近世尊已頭面頂禮佛世尊足即白佛言大德世尊請為我說法善逝世尊請為我說無盡利益安樂之法婆希如是說已世尊告言婆希此非宜時我沿家托鉢故婆希再白佛言大德世尊世尊有命難乃至我有命難最為難知大德世尊請為我說法善逝世尊請為我說無盡利益安樂之法如是再說乃至三說大德世尊世尊有命難乃至我有命難最為難知大德世尊請為我說法請為我說無盡利益安樂之法爾時世尊即為說言婆希汝當如是學見唯是見聞唯是聞知唯是知覺唯是覺婆希汝當如是學婆希汝能於見時唯是見於聞時唯是聞於知時唯是知於覺時唯是覺如是之時汝無有處汝無有處時汝無有現在世無有未來世汝無有兩世如是則苦盡時族姓子摩希樹皮衣行者心不執著煩惱脫落以世尊略說法故時世尊略說於族姓子摩希樹皮衣行者已却行而去時世尊去已未久乳犢牝牛角觸摩希倒地死時世尊在舍衛城托鉢飯食訖與比丘眾歸見摩希倒地死即告比丘眾言諸比丘眾汝等共扶摩希軀體安榻上運去茶毗造塔入骨諸比丘眾摩希與汝等同是梵行者而彼已死諸比丘眾答如是世尊即共扶摩希軀體安榻上運去茶毗造塔入骨已即同往禮世尊却坐一旁而問佛言大德世尊摩希軀體我等茶毗訖摩希之塔我等造訖摩希之趣如何彼之來生如何佛言諸比丘眾摩希是賢者於法修行以問法故不惱難我摩希已入涅槃爾時世尊如是知已而自說言地水火風不著涅槃而涅槃界星無光明日亦不現月無光輝亦無黑暗婆羅門能自悟四諦名聖者時則彼婆羅門當能解脫於色及無色界之苦樂摩希經終本品總攝經有一菩提經一二菩提經二三菩提經三四牧羊者尼拘律林經五長老經六大迦葉經七波吒經八戰勝經九結髮經十摩希經共十經菩提品終第二品目真隣陀品第一目真隣陀經如是我聞一時世尊初成正覺在優樓比螺村尼連禪河目真鄰陀樹住爾時世尊單跏趺坐享解脫樂經七日已爾時非時雲起大雨續降經於七日寒風來侵時目真隣陀龍王從其居出來至佛所以身繞佛七重捲之驤首張頸覆護佛頂而自念言寒氣莫侵世尊