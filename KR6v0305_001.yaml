七日七日過已即自銷失諸比丘汝當對彼以非淨人語粗惡語忿恨誹罵辱責比丘者言妄語者作惡而言不作者必墮地獄此二種作惡人捨命之後來世生惡趣同時諸比丘於佛誦此偈語即對彼以非淨人語粗惡語忿恨誹罵辱責比丘者言妄語者作惡而言不作者必墮地獄此二種作惡人捨命之後來世生惡趣同時諸人眾各自念言諸釋迦子沙門無有過失諸釋迦子沙門無有作惡彼誹罵辱責語不能久有僅有七日七日過已即自銷失時諸比丘往見世尊禮世尊已却坐一旁而白佛言大德世尊奇哉奇哉大德世尊昔所未有世尊告諸比丘如是諸語不能久有七日過已即當銷失如今諸語已銷失已爾時世尊如是知已而自說言不自攝護常以惡語刺傷於人猶如敵軍以箭刺象以此之故比丘當以無害之心安忍他人諸粗惡語舍利弗經終第九優婆先那婆檀提子經如是我聞一時世尊在王舍城竹林迦蘭陀迦園住時優婆先那婆檀提子尊者從宴坐起而自念言我已有得我有妙得世尊應供正等覺佛陀是我師尊我依佛所證法出家修行我是梵行者持戒善法戒行圓滿定心堅固是漏盡阿羅漢有大神力有大威力我已生死滅盡爾時世尊如是知優婆先那婆檀提子尊者心之所念而自說言生本無苦賢者見道於死無悲於眾生中亦無所悲比丘斷愛心住於定則輪迴盡無有再生優婆先那婆檀提子經終第十舍利弗經如是我聞一時世尊在舍衛城竹林迦蘭陀迦園住爾時舍利弗尊者離佛不遠結雙跏趺端身正坐觀察自心寂靜爾時世尊見舍利弗尊者於不遠處結雙跏趺端身正坐觀察自心寂靜爾時世尊如是知已而自說言若諸比丘能靜息心滅生之愛斷盡輪迴則能解脫魔羅之縛舍利弗經終本品總攝經共一彌醯經二憍慢經三牧牛人經四月明經五象經六賓頭盧經七舍利弗經八孫陀利經九優婆先那婆檀提子經十舍利弗經共十經第四彌希品終第五品蘇那長老品第一王經如是我聞一時世尊在舍衛城祗陀林給孤獨長者園住時憍薩羅國波斯匿王與王后勝鬘妃在王宮最上層住時波斯匿王問勝鬘妃言勝鬘汝所愛人有勝於愛汝自己者否勝鬘妃答言大王我所愛人無有勝於愛我自己者大王而大王所愛人有勝於愛大王自己者否波斯匿王答言勝鬘我所愛人亦無有勝於愛我自己者時波斯匿王自王宮降至世尊所禮世尊已却坐一旁而白佛言大德世尊我與勝鬘妃在王宮住問勝鬘妃言汝所愛人有勝於愛汝自己者否我如是問言勝鬘妃言大王我所愛人無有勝於愛我自己者大王而大王所愛人有勝於愛大王自己者否我答言勝鬘我所愛人亦無有勝於愛我自己者爾時世尊如是知已而自說言人於四方至心尋求無有何方有較自己為更可愛諸有眾生各愛自己以此之故愛自己者不應害他王經終第二短命經如是我聞一時佛在舍衛城祗陀林給孤獨長者園住爾時夕時阿難尊者宴坐起至世尊所禮世尊已却坐一旁而白佛言大德世尊奇哉奇哉大德世尊昔所未有世尊佛母命如是短世尊降誕却後七日佛母壽終而生兜率世尊白言阿難如是如是阿難如是如是阿難諸菩薩母命如是短菩薩降誕却後七日菩薩之母即便捨壽而生兜率爾時世尊如是知已而自說言既生之生將生之生終必棄捨肉身而去賢者知生必歸壞滅故勤修行短命經終第三癩病者經如是我聞一時世尊在王舍城竹林迦蘭陀迦園住時王舍城有癩病者名善覺貧乏孤獨困苦爾時世尊諸比丘眾所共圍繞而為說法善覺於遠處見如是人眾圍繞而自念言彼處當有施與噉食物食用物我當往彼我當得諸噉食物食用物爾時善覺即往彼處見佛世尊比丘圍繞而為說法善覺自念諸人眾等不施與噉食物食用物瞿曇沙門正在說法則我亦當聽法念已即入眾中却坐一旁而自念言我亦當聽法爾時世尊知諸人眾心之所念而自證知誰當知法爾時世尊即對癩病者善覺說布施持戒生天欲愛過罪乃至出離功德爾時世尊知善覺心謙下柔和無有覆蓋最極澄淨即為說諸佛所說四聖諦所謂苦集滅道爾時善覺即於座中得無塵眼無垢眼而自證知諸法法爾而生法爾而滅有如淨布堪受色染爾時善覺見法已證法已悟法已達法已超諸疑見離諸惑見正信堅固住於聖教不信餘教即從座起近詣世尊禮世尊已却坐一旁而白佛言大德世尊佛所說法最為明淨大德世尊佛所說法最為明淨大德世尊佛所說法最為詳盡如揭覆蔽如開掩閉作盲者導作暗明燈令人能見大德世尊我今歸命世尊歸命於法歸命僧眾願佛證知始自今日乃至命終我是歸命世尊優婆塞爾時善覺受佛教示見法受持堅固悅樂佛之教法即從座起作禮右繞辭佛而出去未嘗久遇犢母牛角觸善覺死爾時諸比丘眾來見世尊禮世尊已却坐一面而白佛言大德世尊世尊教示善覺見法受持堅固悅樂佛之教法而今死亡彼何去趣來生如何爾時世尊為懸記言諸比丘善覺是賢者正行法者不苦惱我諸比丘善覺已證預流果三結滅盡無有退轉將來必證正覺世尊白已一比丘問言大德世尊以何因緣令善覺貧乏孤獨困苦佛言善覺夙生是王舍城長者子在園遊行見多迦羅尸棄辟支佛獨覺佛城中托鉢而自念言此癩病者將往何處言已吐唾而去以此之故墮入地獄極為多年百年千年乃至十萬年已而以餘業生王舍城貧乏孤獨困苦彼因我教信受持戒修學修捨修慧又依我教信受持戒修學修捨修慧今身壞命終得生忉利天善趣彼之色身稱譽較諸天勝爾時世尊如是知已而自說言賢者遠離世間諸惡如明眼人見有他路即避崎嶇不平之路癩病者經終第四兒童經如是我聞一時世尊在舍衛城祗陀林給孤獨長者園住時眾多兒童在舍衛城與祗陀林間捕魚爾時朝時世尊著衣持鉢入舍衛城托鉢見眾多兒童在舍衛城與祗陀林間捕魚即往問言汝諸兒童汝等怖畏苦否苦非汝等所愛否諸兒童言如是大德我等怖畏苦苦非我等所愛爾時世尊如是知已而自說言若怖畏苦苦非所愛則不當於露處隱處而作惡行若汝將作若作惡業則汝等眾飛逃何處不能脫苦兒童經終第五布薩經如是我聞一時世尊在舍衛城東園鹿母講堂住爾時布薩日比丘眾圍繞佛坐時夜分時初夜已過阿難尊者即從座起整袈裟衣偏袒一肩向佛世尊合掌作禮而白佛言大德世尊初夜已過僧眾坐久請佛世尊為僧眾說波羅提木叉阿難說已世尊默然乃至再說中夜已過阿難尊者即從座起整袈裟衣偏袒一肩向佛世尊合掌作禮而白佛言大德世尊中夜已過僧眾坐久請佛世尊為僧眾說波羅提木叉乃至再說世尊默然乃至三說後夜已過晨光出現天將亮時阿難尊者即從座起整袈裟衣偏袒一肩向佛世尊合掌作禮而白佛言大德世尊後夜已過晨光出現天將亮時僧眾坐久請佛世尊為僧眾說波羅提木叉爾時佛言阿難眾中不淨時大目建連尊者自思念言世尊說言阿難眾中不淨如是誰為不淨時大目建連尊者以自心知諸比丘心已見有一人犯戒惡行不淨可厭惡行覆蔽惡行自稱沙門而非沙門自稱梵行而非梵行內腐漏滿如塵穢聚僧眾中坐時大目建連尊者即往告言汝當起世尊已見汝汝不能與比丘共住彼人默然乃至再說乃至三說大目建連尊者復告彼人言汝當起世尊已見汝汝不能與比丘共住乃至三說彼人默然時大目建連尊者即捉彼臂挽出門外關門下閂已回返見佛而白佛言大德世尊我已令彼人出已眾中清淨請佛世尊為僧眾說波羅提木叉佛言目建連奇哉奇哉昔所未有如是愚者乃能強坐令人捉臂挽出爾時世尊告比丘言諸比丘始自今日我不作布薩不說波羅提木叉始自今日汝等當自作布薩當自說波羅提木叉諸比丘眾眾中不淨如來不應作布薩不應說波羅提木叉以非位非處故諸比丘眾大海有八種不可思議未曾有法為諸阿修羅之所共見之所樂住八種云何諸比丘眾大海次第而深非如斷崖峻谷此是第一不可思議未曾有法為諸阿修羅之所樂住復次大海常滿而不溢岸諸比丘眾大海常滿而不溢岸此是第二不可思議未曾有法復次大海不雜死屍以海浪能衝死屍至陸地故諸比丘眾大海不雜死屍以海浪能衝死屍至陸地故此是第三不可思議未曾有法復次有諸大河所謂恒河閻牟那河阿支羅伐底河薩羅浮河摩希河如是大河流入大海則失名族同稱大海諸比丘眾有諸大河所謂恒河閻牟那河阿支羅伐底河薩羅浮河摩希河如是大河流入大海則失名族同稱大海此是第四不可思議未曾有法復次世界諸河同流入海空中之雨亦降於海而大海水不為增減諸比丘眾世界諸河同流入海空中之雨亦降於海而大海水不為增減此是第五不可思議未曾有法復次大海之味唯一鹹味此是第六不可思議未曾有法復次大海之中有無數寶大海之中有如是寶真珠末尼琉璃硨渠寶石珊瑚銀金紅玉瑪瑙諸比丘眾大海之中有無數寶此是第七不可思議未曾有法復次大海之中大生所住大海之中有如是生帝彌魚彌伽羅魚帝彌帝彌伽羅魚阿修羅乾闥婆乃至身大百由旬二百由旬三百由旬四百由旬五百由旬諸生亦在海住諸比丘眾大海之中大生所住此是第八不可思議未曾有法而為阿修羅眾之所共見之所樂住諸比丘眾大海之中如是奇哉有此八種而為阿修羅眾之所共見之所樂住諸比丘眾戒律之中亦有八種不可思議未曾有法而為諸比丘眾之所共見之所樂住諸比丘眾戒律之中次第而學次第而行次第而證無有卒證阿羅漢道亦如大海次第而深非如斷崖峻谷諸比丘眾戒律之中次第而學次第而行次第而證非如斷崖峻谷此是第一不可思議未曾有法而為比丘之所共見之所樂住諸比丘眾我弟子眾不因命難而犯我所制學處亦如大海常滿而不溢岸諸比丘眾我弟子眾不犯我所制學處此是第二不可思議未曾有法諸比丘眾有人犯戒惡行不淨可厭惡行覆蔽惡行自稱沙門而非沙門自稱梵行而非梵行內腐漏滿如塵穢聚僧眾不與共住斥彼速出彼雖在僧眾中坐實則遠離僧眾僧眾亦遠離彼亦如大海不雜死屍以河浪能衝死屍至陸地故諸比丘眾有人犯戒惡行不淨乃至僧眾亦遠離彼人此是第三不可思議未曾有法諸比丘眾諸四姓者所謂剎帝利婆羅門吠舍首陀羅依如來教持戒出家則失名族同稱釋子沙門亦如恒河閻牟那河阿支羅伐底河薩羅浮河摩希河四大河水流入大海則失名族同稱大海以此之故諸比丘眾諸四姓者乃至同稱釋子沙門此是第四不可思議未曾有法諸比丘眾眾多比丘入於無餘涅槃界而涅槃界不因彼彼比丘而有增減亦如世界諸河同流入海空中之雨亦降於海而大海水不為增減以此之故諸比丘眾入於無餘涅槃界而涅槃界不因彼彼比丘而有增減此是第五不可思議未曾有法諸比丘眾戒律之味唯解脫味亦如大海唯一鹹味以此之故諸比丘眾戒律之味唯解脫味此是第六不可思議未曾有法諸比丘眾戒律之中有如是寶所謂四念處四正勤四神足五根五力七覺支八聖道支亦如大海有無數寶大海之中有如是寶所謂真珠摩尼琉璃硨磲寶石珊瑚銀金紅玉瑪瑙以此之故諸比丘眾戒律之中有無數寶乃至八聖道支此是第七不可思議未曾有法諸比丘眾戒律之中大生所住戒律之中有如是生所謂修預流果之預流向者修一來果之一來向者修不還果之不還向者修阿羅漢果之阿羅漢向者亦如大海大生所住大海之中有如是生所謂帝