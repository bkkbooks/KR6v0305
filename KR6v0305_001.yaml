則是捨者有正念正知若有比丘以法為樂而樂於法隨念於法則不退失於彼正法若諸比丘行住坐臥內心寂靜必達真寂第七經終第八黑暗經諸比丘如是三種不善尋思是黑暗作不慧眼作是無智作令慧滅盡令生忿恨不生涅槃云何是三謂一是欲尋思一是忿恨尋思一是害尋思如是三種不善尋思是黑暗作不慧眼作是無智作令慧滅盡令生忿恨不生湼槃諸比丘如是三種尋思不黑暗作是慧眼作是禪那作令慧增長不生忿恨令生湼槃云何是三謂一是出離尋思一是不忿恨尋思一是無害尋思諸比丘如是三種善尋思不黑暗作是慧眼作是禪那作令慧眼增長不生忿恨令生湼槃當常尋思三善尋思而去三種不善尋思唯精進者能為滅息諸邪尋思如雨息塵以此之故聖精進者入寂尋思於現法中達安穩處第八經終第九污經諸比丘如是三種內污是內非友是內冤怨是內殺者是內敵人云何是三謂一是貪一是瞋一是痴諸比丘如是三種內污是內非友是內冤怨是內殺者是內敵人貪令毀失令心驕恣人不知貪是內大患有貪之人不識利益不見妙法貪覆人時人即暗昧能斷貪者於可貪境不起貪念聖道能令人離於貪如水不著於蓮葉上瞋令毀失令心驕恣人不知瞋是內大患有瞋之人不識利益不見妙法瞋覆人時人即暗昧能斷瞋者於害人境不起害心聖道能令人離於瞋如多羅果熟而落下痴令毀失令心驕恣人不知痴是內大患有痴之人不識利益不見妙法痴覆人時人即暗昧能斷痴者於迷惑境不起痴心人能斷痴如日破暗第九經終第十提婆達多經諸比丘提婆達多為三種惡法之所覆蓋傷毀其心永劫生於無幸處生於地獄無可救藥云何是三謂提婆達多為惡欲之所覆蓋傷毀其心永劫生於無幸處生於地獄無可救藥提婆達多為惡友之所覆蓋傷毀其心永劫生於無幸處生於地獄無可救藥有最上之道最上之果可證可得而提婆達多以少證上人法而中途廢棄可證可得諸比丘提婆達多為三種惡法之所覆蓋傷毀其心永劫生於無幸處生於地獄無可救藥人有惡欲則莫出現於此世間有惡欲人當應自知生於何趣如是我聞提婆達多世所共知是智者人眾所共稱是調御已有妙稱譽提婆達多行於放逸侵害如來以此之故墮入無間地獄四門可怖可畏人若侵害無害之人無惡業人則其惡果當自身受有害心者不濟人者如以毒瓶侵害大海終不能得以海大故有人欲害如來尊者心寂滅者而其侵害終不能及如來尊者諸比丘眾行佛之道佛弟子道當盡苦際有智比丘當友佛陀或佛弟子當從佛陀或佛弟子世尊說如是義如是我聞第十經終本品共攝經一尋思經二恭敬經三聲經四天經五界經六不淨經七法經八黑暗經九污經十提婆達多經第三集第四品終第三集第五品第一勝信經此是諦實世尊如是語此經是世尊證阿羅漢已說如是我聞諸比丘如是三種勝信云何是三諸比丘無足二足四足多足有色無色有想無想非想非非想如是所有有情中智者說言如來應正等覺佛世尊勝諸所有有情諸比丘人若信於佛陀則名信於最勝之人而其最勝之果則為其信於最勝佛陀之人所得諸比丘有為法無為法如是所有法中智者說言離貪謂離於慢法無渴拔執斷輪廻滅愛無貪寂滅湼槃之法勝諸所有有為法及無為法諸比丘人若信於離貪法則名信於最勝之法而其最勝之果則為其信於最勝法之人所得諸比丘所有有為法中智者說言八支聖道謂正見正思惟正語正業正命正勤正念正定勝諸所有有為法諸比丘人若信於八支聖道法則名信於最勝之法而其最勝之果則為其信於最勝法之人所得諸比丘所有諸眾諸會智者說言如來弟子謂諸四雙八輩勝於所有諸眾諸會諸比丘人若信於僧眾則名信於最勝之眾而其最勝之果則為其信於最勝眾之人所得世尊說如是義已於彼經中世尊說如是偈人若信於最勝三寶明最勝法信最勝佛無漏聖者信最勝法盡諸貪欲寂靜安樂信最勝僧最上福田奉施三寶勝福所感增上壽色稱譽德行增上福力賢者奉施最勝三寶住最勝法則於人天最勝自在世尊說如是義如是我聞第一經終第二活命經諸比丘求摶飯以活命者責難者則責難言於世持鉢遊行求摶飯食諸比丘族姓子行於勝義依於勝義不被王者拘捕不被賊眾禁錮不負債無有怖畏安和而住而求摶飯活命者自思惟言我輩被生老病死愁悲苦憂惱之所覆蓋苦所追隨苦所覆蓋我輩應云何滅諸苦際諸族姓子如是出家而乃有大貪欲有大愛欲有瞋恨心有邪思惟有放逸念不自知心不堅固心趣於邪不護諸根如是我說是人猶如火葬台焚尸薪炬兩端火燃中間糞污不能用於聚落林間如是之人失壞在家資用不成滿沙門勝義世尊說如是義已於彼經中世尊說如是偈彼邪惡人失壞在家所有資用而復毀棄沙門勝果如火葬台焚屍薪炬寧可吞食火燒鐵丸勝於污戒不調御者食諸聚落所施摶飯第二經終第三和合衣經僧伽胝衣諸比丘若有比丘執和合衣端尾隨我行依我足跡行但彼比丘有貪欲有大愛欲有瞋恨心有邪思惟有放逸念不自知心不堅固心趣於邪不護諸根如是則彼比丘實遠我甚我亦遠彼此復云何以彼比丘不見法故名不見我諸比丘若彼比丘住百旬處而彼比丘無有貪欲無有愛欲無有瞋恨不邪思惟住不放逸自知定心堅固專心一境守護諸根如是則彼比丘實近於我我亦近彼此復云何以彼比丘見於法故以見法故是名見我多欲之人顛倒惱迫依愛欲行熱惱不息彼雖尾隨正等覺佛無怖畏者滅熱惱者但彼多欲如是之人名遙見佛有智之人知最上法是無怖畏住於寂靜如水無波如是無畏能滅熱惱無愛欲者名近見佛第三經終第四火經諸比丘如是三火聚云何是三謂一是貪火一是瞋火一是癡火諸比丘如是是三火聚謂貪是火焚燒欲染諸眾生等謂瞋是火焚燒忿恨諸眾生等謂痴是火焚燒迷妄不知聖法諸無智人如是三火此世來世焚燒戀樂自色身人彼被焚人不知火焚如是眾生增地獄眾生畜生趣阿修羅趣及餓鬼趣不能脫離魔羅之縛又諸眾生於正等覺佛陀聖教晝夜六時精勤修持於自色身作不淨想則滅貪火最勝之人以慈心故得滅瞋火以慧力故得滅痴火如是有慧諸眾生等能自守護諸三火聚而證無餘湼槃之界苦盡無餘諸有智者見於聖諦通達正智以慧正見是諸勝知盡諸後有不再來生第四經終第五觀察經諸比丘若比丘住於觀察知自識心不散亂顛倒不住於內愛等則應如是住於觀察若比丘不怖不著不取則生老死苦不再復有若諸比丘能捨七縛斷愛後有生死輪廻則不能有註七縛即愛見慢忿無明煩惱惡行第五經終第六生經諸比丘如是三欲云何是三謂一是眾生有現欲一是諸天有化樂欲一是諸天有他化自在欲諸比丘如是三欲眾生現欲天化樂欲他化自在諸天之欲人及眾生享諸欲樂不能超越彼此輪廻智者當棄人天欲樂智者應斷人所難斷愛著流注諸可喜色及可樂色則能證於無餘湼槃聖見智者通達正智以慧正見是最勝知盡諸後有不再來生第六經終第七欲經諸比丘若人於欲繫縛相應於後有繫縛相應雖證不還果者亦當再生諸比丘聖者捨離欲繫縛已但於後有繫縛相應是證不還果者不再來生諸比丘聖者捨離欲繫縛已捨離後有繫縛已則證無漏阿羅漢果眾生相應欲有繫縛則當墮入生死輪廻若有眾生離欲繫縛智者說彼是不還果若有眾生能斷諸疑盡後有已則已漏盡而達彼岸第七經終第八善經諸比丘比丘有善戒有善法有善慧我說是比丘是漏盡阿羅漢住足梵行是住法律儀是最上人諸比丘云何是比丘有善戒謂比丘住法律儀是有戒者守護波羅提木叉具足行及行處於諸小罪見諸大患於諸學處受持修習諸比丘如是是有善戒比丘有善戒比丘有如是云何是有善法比丘謂比丘住法律儀常勤修習增上三十七菩提分法相應諸比丘如是是有善法比丘有善法比丘有如是云何是有善慧比丘謂比丘住法律儀以現法上慧盡諸漏故遍知證入無漏心解脫慧解脫諸比丘如是是有慧比丘有善戒有善法有善慧比丘有如是我說是比丘是漏盡阿羅漢住足梵行是住法律儀最上人有諸比丘無身惡行無語惡行無意惡行則佛說彼是有慚者有善戒者增上修習達聖道禪一切諸法而證正覺以佛為首一切聖者說彼比丘已無煩惱有妙善法有諸比丘正知此生已盡苦際則佛說彼是無煩惱成滿諸法無苦斷疑無住無漏有善慧者第八經終第九施經諸比丘如是二種施謂一是財施一是法施諸比丘此二種施法施為勝諸比丘如是二種分與謂一是財分與一是法分與諸比丘如是二種分與法分與為勝諸比丘有二種攝益謂一是財攝益一是法攝益諸比丘如是二種攝益法攝益為勝諸佛說言施是最勝世尊讚言分與最勝智者信於正等覺佛及諸聖僧正知施與而能隨時恭敬施與信善逝語則得勝淨於善逝語能不放逸則得勝淨第九經終第十法經諸比丘我說證三明者是婆羅門我不說彼諸依人說而隨說者是婆羅門諸比丘云何我說證三明者是婆羅門而不說彼諸依人說而隨說者是婆羅門諸比丘住法律儀比丘得宿住隨念謂得一生二生三生四生五生六生七生八生九生十生二十生三十生四十生五十生百生千生百千生幾壞刼幾成刼幾壞成刼我於彼處有如是名有如是姓有如是色身有如是食有如是樂受苦受有如是壽限於彼處死生彼彼處而於彼彼處有如是名有如是姓有如是色身有如是食有如是樂受苦受有如是壽限於彼彼處死生於此處汝等當得如彼種種相狀宿住隨念如是汝已證第一明已斷無明而明已生已滅黑暗而生光明是不放逸人勇猛精進復次比丘以超過人眼清淨天眼知諸眾生死生劣勝好色惡色善趣惡趣知諸眾生隨業流轉知諸眾生成就身惡行語惡行意惡行誹謗聖者住於邪見行邪見業身壞命終生於無幸處惡趣墮處地獄又諸眾生成就身善行語善行意善行不謗聖者住於正見行正見業身壞命終生於善趣天界如是汝當以超過人眼清淨天眼見諸眾生死生劣勝好色惡色善趣惡趣知諸眾生隨業流轉如是汝已證第二明已斷無明而明已生已滅黑暗而生光明是不放逸人勇猛精進復次比丘以現法上慧盡諸漏故遍知證入無漏心解脫慧解脫如是汝已證第三明已斷無明而明已生已滅黑暗而生光明是不放逸人勇猛精進諸比丘我說如是證三明者是婆羅門而不說彼諸依人說而隨說者是婆羅門我說彼諸宿住隨念見於天界及無幸處盡生際者是為牟尼以最勝慧住足梵行證三明者是婆羅門我不說彼隨人之說而再說者是婆羅門第十經終本品共攝經一信經二活命經三和合衣經四火經五觀察經六生經七欲經八善經九施經十法經第三集第五品終第四集第一婆羅門經此是諦實世尊如是語此經是世尊證阿羅漢已說如是我聞諸比丘我是乞者相應婆羅門常清淨手得最後身斷煩惱醫士汝是我胸之子生於我口生於法法所化生法繼承者非財富繼承者諸比丘如是二種施謂一是財施一是法施此二種施法施最勝諸比丘如是二種分與謂一是財分與一是法分與此二種分與法分與最勝諸比丘如是二種攝益謂一是財攝益一是法攝益此二種攝益法攝益最勝諸比丘如是二種供養謂一是財供養一是法供養此二種供養法供養最勝世尊說如是義已於彼經中世尊說如是偈諸眾生等當皈敬於供養妙法如來尊者無慳吝者攝益眾生人天最勝越後有者世尊說如是義如是我聞第一經終第二四事經諸比丘如是是易得而無過患四小事云何為四諸比丘諸三衣糞掃衣是小事易得而無過患諸以遊行得摶飯是小事易得而無過患諸於樹下作坐臥處是小事易得而無過患諸家畜尿藥品是小事易得而無過患諸比丘如是是易得而無過患四小事諸比丘我說比丘有一法謂以易得而無過患小事而自知足是成就沙門分心之惱逼不生於彼易取易得而無過患諸四小事謂坐臥處三衣飲食以及醫藥如是則是知足比丘如是比丘無有邪向知足比丘則不放逸住於正法住沙門位如如來說第二經終第三知經諸比丘我說有知見比丘能盡諸漏我不說不知見比丘能盡諸漏諸比丘比丘有何所知有何所見而盡諸漏若比丘知見此是苦諸漏則盡若比丘知見此是苦集苦之因諸漏則盡若比丘知見此是苦滅諸漏則盡若比丘知見苦滅之道諸漏則盡諸比丘比丘如是知見則諸漏盡有學比丘行於直道則得初禪證預流果最勝知根次第而得最上遍知解脫智見則為無漏聖者所證聖道之禪能盡漏結諸懈怠者不能知見不能脫於煩惱結縛第三經終第四沙門經諸比丘有諸沙門婆羅門不如實知此是苦因此是苦滅此是苦滅之道如是諸沙門非沙門眾中沙門如是諸婆羅門非婆羅門眾中婆羅門如是眾等不以現法勝慧正知實證於果謂沙門果又復謂婆羅門果有諸沙門婆羅門如實知此是苦此是苦因此是苦滅此是苦滅之道如是諸沙門婆羅門我稱讚彼是沙門眾中沙門婆羅門眾中婆羅門如是眾等當以現法勝慧正知實證於果謂沙門果又復謂婆羅門果有諸沙門婆羅門等不實知苦不知苦因不知苦滅及滅苦道如是眾等失心解脫及慧解脫不能盡苦如是眾等入於生老有諸沙門婆羅門等能實知苦知苦之因知苦之滅及滅苦道如是眾等具心解脫及慧解脫能盡諸苦如是眾等不再生老第四經終第五戒經諸比丘比丘具足戒定慧解脫解脫智見能教誡令知令見今信受令勇猛令悅樂能說正法諸比丘我說人若能見彼眾比丘聽彼眾比丘近彼眾比丘侍彼眾比丘隨念彼眾比丘隨彼眾比丘出家則有大益所以者何以能承事親近隨侍如是比丘眾則戒蘊定蘊解脫蘊解脫智見蘊雖未成滿則能修習而得成滿諸比丘如是比丘我說是師尊是引導者是離煩惱敵是滅暗是與光明是放光輝是耀光彩是揭火炬是具眼聖者若能見於已調御已常住法者諸聖者眾則為智者之所歡樂諸智者眾於滅暗者具眼賢者離煩惱敵諸聖者眾演說正法令世光明而以勝慧正知斷生則無後有第五經終第六愛經諸比丘比丘起愛起於如是四種愛云何為四諸比丘比丘起愛一是起於三衣一是起於摶飯一是起於坐臥處一是起於此生彼滅諸比丘比丘起愛起於如是四種愛以愛為友則永流轉不能超出此生彼滅生死輪迴比丘當知愛是苦因人若無愛無有執著住於正念則無輪迴第六經終第七梵經諸比丘若族姓子在家尊敬父母如是族姓家名為梵天其家有梵天尊親有梵天尊師有供梵天謂梵天是其父母梵天尊親是其父母梵天尊師是其父母有供梵天是其父母所以者何以父母於子護養珍保於子示現於此世間故我說父母子之梵天梵天尊親及供梵天以此之故智者當以飯食水衣諸坐臥具塗香沐浴及為洗足智者當讚如是諸人以此諸人捨此世已生天界故第七經終第八資護經諸沙門諸婆羅門居士於汝等有大資護以三衣飲食坐臥具醫藥道具供養汝等汝等當資護諸婆羅門居士為之說法初中後善文義具足清淨圓滿諸比丘居家及出家以財施及法施之力互相資護住於梵行為斷暴流正盡苦際在家出家諸人等眾互相資護能以正法最勝成就離諸煩惱出家者眾於在家者得諸三衣飲食臥具醫藥等事而在家者依修正行諸聖者眾依阿羅漢尊者所說以清淨慧修於三昧依此聖教達於善趣常享天樂第八經終第九欺誑經諸比丘有諸比丘是欺誑者慢者饒舌煩惱如山煩惱如高長蘆心不住定如是比丘不尊重我離我律儀諸比丘有諸比丘非欺誑者不饒舌是賢者不慢者心住於定如是比丘是尊重我不離我律儀能於我律儀法中增長增上廣嚴有諸比丘是欺誑者慢者饒舌煩惱如山煩惱如蘆心不住定此諸比丘於正等覺佛陀所說法律儀中不能增長有諸比丘非欺誑者亦不饒舌則是賢者無有慢心心住於定如是比丘於正等覺佛陀所說法律儀中則能增長第九經終第十人經諸比丘如人於河水流所漂謂被可喜色可樂色所漂諸具眼人立於岸上當為說言汝汝大德被河流所漂謂諸可喜色可樂色所漂河底下處有波浪有旋渦有惡獸有夜叉汝當死亡或苦近死爾時此人聞諸人語即以手足逆流力游諸比丘我說此喻欲令明義如是是喻義諸比丘河流是愛可喜色可樂色是六內處河底下處是五分下結波浪是忿恨旋渦是五欲樂惡獸夜叉是女人逆流是出離以手足力游是精進岸上具眼人是如來應供正等覺佛有諸比丘於諸煩惱期得捨斷應捨諸欲及諸苦等住於正智得心解脫證解脫道及解脫果有智比丘盡此世間住足梵行我說此人到彼岸者第十經終第十一行經諸比丘比丘在行時有欲尋思瞋尋思害尋思若諸比丘住此欲尋思瞋尋思害尋思而不棄捨不損減不令滅不令盡如是行時比丘我說彼人隨時住於無勤無愧懈怠劣勤諸比丘比丘在住立時有欲尋思瞋尋思害尋思乃至比丘在坐時乃至比丘在臥時醒時有欲尋思瞋尋思害尋思而不棄捨不損減不令滅不令盡如是臥時醒時比丘我說彼人隨時住於無勤無愧懈怠劣勤諸比丘比丘在行時有欲尋思瞋尋思害尋思若諸比丘不住欲尋思瞋尋思害尋思而棄捨損減令滅令盡如是行時比丘我說彼人隨時住於勤有愧不懈怠堅定比丘在住立時有欲尋思瞋尋思害尋思乃至坐時乃至臥時醒時有欲尋思瞋尋思害尋思若彼比丘不住欲尋思瞋尋思害尋思而棄捨損減令滅令盡如是臥時醒時比丘我說彼人隨時住於勤有愧不懈怠堅定若諸比丘行時住時坐時臥時依於家室住惡尋思如是比丘行於邪道住於痴境如是比丘不能證於最上菩提若諸比丘行時住時坐時臥時滅惡尋思住法尋思則能證得最上菩提第十一經終第十二具足戒經諸比丘汝等當具足戒具足波羅提木叉守護波羅提木叉律儀具足行及行處於諸小罪見大怖畏受持修習一切學處諸比丘汝等住具足戒具足波羅提木叉守護波羅提木叉律儀具足行及行處於諸小罪見大怖畏受持修習一切學處已應於何事是最上作諸比丘若比丘行時已滅魔欲瞋忿昏沈睡眠掉舉惡作已捨疑而勤精進正念不惑調身已不粗暴專心一境如是行時比丘我說彼是精進有愧常行精進勇猛諸比丘若比丘住時已滅魔欲瞋忿昏沈睡眠掉舉惡作乃至若比丘坐時已滅貪欲瞋忿昏沈睡眠掉舉惡作乃至若比丘臥時醒時已滅貪欲瞋忿昏沈睡眠掉舉惡作已捨疑而勤精進正念不惑調身已不粗暴專心一境如是臥時醒時比丘我說是精進有愧常行精進勇猛精勤比丘行住坐臥手足屈伸而正諦觀前視下地去來眾生法蘊生滅則為佛陀諸聖之首說言彼人精進行寂而不散亂有淨禪見隨學寂法正念修學常住勇猛第十二經終第十三經世間經此是諦實世尊如是語此經是世尊證阿羅漢已說如是我聞諸比丘如來悟世間已已離世間悟世間因已捨世間因已悟世間滅已實證世間滅已悟世間滅之道已修習世間滅之道已諸比丘世間乃至天界魔界梵界諸眾生沙門婆羅門天人所見所聞所知所明所達所求所念諸所有物如來悉知以此之故諸智者稱為如來諸比丘如來於某夜證無上正等覺於某夜於無餘依涅槃界而般涅槃於其中間演說法語彼諸法語必當如是非不如是以此之故諸智者稱為如來諸比丘如來如是說如是行如是行如是說以此之故智者稱為如來諸比丘如來統此無人能統之世間乃至天界魔界梵界眾生沙門婆羅門天人明見而命令之以此之故諸智者稱為如來世尊說是義已於彼經中世尊說如是偈佛以勝慧於諸世間如實而知所有一切離諸世間世間無比是大賢者統伏魔眾及諸行蘊脫煩惱縛諸佛世尊已斷諸漏無有諸苦斷一切疑盡一切業盡依著法彼之世尊名為佛陀彼之世尊名勝師子為人天界轉於梵輪以此之故皈依於佛諸人天眾來此集會當歸命佛彼之世尊有大德聚無有怖畏諸調御中佛最調御諸寂靜中最上寂靜諸解脫中最上解脫諸渡彼岸佛最第一以此之故諸人天眾當歸命彼有最大德無有怖畏之佛陀尊以人天中更無有人等世尊故本品共攝經一婆羅門經二四事經三知經四沙門經五戒經六愛經七梵經八賢護經九欺誑經十人經十一行經十二具足戒經十三世間經第四集終如是語經終
