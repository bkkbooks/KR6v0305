世尊從三昧起告阿難言阿難汝若能知當不說此阿難我與五百比丘同入不動三昧爾時世尊如是知已而自說言諸有比丘能勝欲刺能勝惡口能不殺生能無縛著則彼比丘不動如山則彼比丘不因苦樂而有搖動耶輸闍經終第四舍利弗經如是我聞一時世尊在舍衛城祗陀林給孤獨長者園住時舍利弗尊者於不遠處正向世尊結跏趺坐端身正念世尊見舍利弗於不遠處正向世尊結跏趺坐端身正念爾時世尊如是知已而自說言比丘如山無有搖動以斷痴故猶如山立無有搖動舍利弗經終第五拘律陀經如是我聞一時世尊在舍衛城祗陀林給孤獨長者園住時大目建連尊者於不遠處端身趺坐內住念身爾時世尊見大目建連尊者於不遠處端身趺坐內住念身爾時世尊如是知已而自說言有諸比丘能住念身守護觸處常入正定如是比丘當能自知滅煩惱已拘律陀經終第六畢陵迦經如是我聞一時世尊在王舍城竹林迦蘭陀迦園住時畢陵迦婆差尊者常呼諸比丘為下賤人時諸比丘往世尊所禮世尊已却坐一旁而白佛言大德世尊畢陵迦婆差尊者常呼諸比丘眾為下賤人時世尊告一比丘言比丘汝往畢陵迦所如我辭言慧命婆差師召汝往彼比丘諾佛已往畢陵迦尊者所而告之言慧命師召汝往畢陵迦婆差諾已即往佛所禮世尊已却坐一旁世尊問畢陵迦尊者言畢陵迦聞汝常呼諸比丘眾為下賤人是否畢陵迦尊者言如是世尊爾時世尊思惟畢陵迦尊者夙生聚蘊已告諸比丘言比丘汝等莫憤婆差比丘婆差比丘不瞋汝等而呼汝等比丘為下賤人婆差比丘五百世生婆羅門族姓婆差比丘經久慣呼他人為下賤人以是之故婆差比丘常呼諸比丘眾為下賤人爾時世尊如是知已而自說言諂慢不生於無貪者不執我所無有諸欲捨諸瞋恚住寂靜人如是之人名婆羅門如是之人名為沙門如是之人名為比丘畢陵迦經終第七大迦葉經如是我聞一時世尊在舍衛城竹林迦蘭陀迦園住時大迦葉尊者在畢鉢羅窟單跏趺坐入一三昧經於七日大迦葉尊者即從定起既出定已自思念言我當往王舍城托鉢時五百天眾請大迦葉尊者受食時朝時分大迦葉尊者却謝五百天眾食著衣持鉢入王舍城托鉢時釋提桓因天王渴欲供大迦葉食即化作織工阿修羅女善生化作紡紗女大迦葉尊者在王舍城沿巷次第托鉢向釋提桓因天王所釋提桓因天王遙見大迦葉尊者即出往迎接鉢入居取飯及羹食菜食納鉢滿出供大迦葉尊者時大迦葉尊者自思念言此有情是誰有如是神力時大迦葉尊者念言得非釋提桓因耶大迦葉尊者如是知已即告釋提桓因言憍尸迦大王已作已大王莫再如是作釋提桓因言大迦葉大德我需福故我當作福時釋提桓因天王右繞禮大迦葉尊者已騰身空中於空中三自說言最上之施我在大迦葉行已最上之施我在大迦葉行已最上之施我在大迦葉行已又三自說言最上之施我在大迦葉行已最上之施我在大迦葉行已最上之施我在大迦葉行已爾時世尊以超人清淨天耳如是知已而自說言托鉢自養不畜養人寂靜堅固常住正念如是比丘人天皈敬大迦葉經終第八托鉢經如是我聞一時世尊在舍衛城祗陀林給孤獨長者園住時諸比丘托鉢回飯食訖在迦里梨樹旁圓舍聚而共說言諸壽者比丘行於托鉢而行托鉢隨時而得見悅眼之色悅耳之聲悅鼻之香悅舌之味悅身之觸諸壽者比丘行於托鉢得人眾供養尊重承事信受恭敬而行托鉢諸壽者我等當行於托鉢當能隨時而得見悅眼之色悅耳之聲悅鼻之香悅舌之味悅身之觸我等當得人眾供養尊重承事信受恭敬而行托鉢諸比丘眾如是說言而未終止爾時夕時佛宴坐起至迦里梨樹旁圓舍敷座而坐問比丘言諸比丘眾汝等聚此作何說言而未終止是如何事比丘眾言大德世尊我等托鉢回飯食訖在迦里梨樹旁圓舍住而共說言諸壽者比丘行於托鉢而行托鉢隨時而得見悅眼之色如是乃至我等當得人眾供養大德世尊我等言說而未終止而世尊至佛言諸比丘汝等是族姓子正信出家不應如是說言汝等聚集當為二事一者說法二者聖者之沈默爾時世尊如是知已而自說言若比丘眾不求讚譽而行托鉢以自活命不畜養人寂靜堅固則彼當為人天所敬托鉢經終第九技藝經如是我聞一時世尊在舍衛城祗陀林給孤獨長者園住時諸比丘托鉢回飯食訖在圓舍聚而共說言諸壽者誰知技藝誰習何藝何藝最上有比丘言調象最上有比丘言調馬最上有比丘言御車最上有比丘言射箭最上有比丘言武藝最上有比丘言印契最上有比丘言算學最上有比丘言數學最上有比丘言書法最上有比丘言詩歌最上有比丘言順世最上有比丘言地理最上諸比丘眾如是說言而未終止時夕時分佛宴坐起至圓舍所敷座而坐問比丘言諸比丘眾汝等聚此作何說言而未終止是如何事比丘答言大德世尊我等托鉢回飯食訖在圓舍聚而共說言誰知技藝如是乃至有比丘言地理最上我等言說而未終止而世尊至佛言諸比丘汝等是族姓子正信出家不應如是說言汝等聚集當為二事一是說法一是聖者之沈默爾時世尊如是知已而自說言比丘不以技藝活命輕諸利養調御諸根解脫諸法棄家行腳不執我所無有諸欲如是之人已能伏魔獨自遊行是名比丘技藝經終第十世間經如是我聞一時世尊初成正覺在優樓比螺村尼連禪河菩提樹下住爾時世尊單跏趺坐享解脫樂經於七日乃從定起以佛眼觀諸世間見諸有情或因貪欲或因瞋恚或因愚癡受大苦惱受大熱惱而在悲苦爾時世尊如是知已而自說言世間熱苦為觸所覆由於自己所計世間與五蘊造異於所計世人著有變異不居既被有覆悅樂著有有情所喜是險所在有情所怖是苦所在當行梵行捨離於有有諸沙門或婆羅門說言以有解脫於有則是常見如是沙門或婆羅門不能脫有有諸沙門或婆羅門說言無有棄捨於有則是斷見如是沙門或婆羅門不能捨有苦生於本若斷諸取則苦不生汝等當見於此世間眾多有情無明所覆樂著五蘊不能脫有一切方處一切諸有如是諸有法爾無常是大苦聚亦是變異若以正智如實見於五蘊之有則能捨棄一切渴愛不喜渴愛而以聖道滅彼渴愛渴愛滅故則是涅槃如是比丘無復後有以不著故已證寂滅如是比丘已善伏魔是戰勝者超越諸有是常住者世間經終本品總攝經一業經二難陀經三耶輸闍經四舍利弗經五拘律陀經六畢陵迦經七大迦葉經八托鉢經九技藝經十世間經共十經第三品難陀品終第四品彌醯品第一彌醯經為求通俗改稱彌希如是我聞一時世尊在遮利迦地遮利迦山住時彌希尊者為佛侍者時彌希尊者往世尊所禮世尊已却立一旁而白佛言大德世尊我將往闍度村托鉢佛言彌希今正是時時朝時分彌希尊者著衣持鉢入闍度城托鉢托鉢回飯食訖往金鞞河在河畔息見菴摩羅林可愛可樂而自念言菴摩羅林實可愛樂是菴羅摩林是族姓子精勤修習處所若世尊許我當來此精勤修習時彌希尊者往世尊所禮世尊已却立一旁而白佛言大德世尊我於朝時著衣持鉢入闍度城托鉢托鉢回飯食訖往金鞞河在河畔息見菴摩羅林可愛可樂而自念言菴摩羅林實可愛樂是菴摩羅林是族姓子精勤修習處所若世尊許我當來此精勤修習大德世尊若世尊許我當往彼菴摩羅林精勤修習彌希尊者白世尊已世尊答言摩希汝暫待我一人住汝暫待俟他比丘來彌希再言大德世尊世尊已無所作為聖道已辦更無所積然我當有作為聖道當積若世尊許我當往彼菴摩羅林精勤修習如是二說世尊白言彌希汝言精勤修習我為汝說彌希今正是時時彌希尊者即從座起右繞禮佛即往菴摩羅林行遍林中於午時分在一樹下坐時彌希尊者在菴摩林有三不善覺欲覺瞋覺害覺乃大增長時彌希尊者自思念言奇哉奇哉昔所未有我以正信出家反受三不善覺欲覺瞋覺害覺之所降伏時夕時分彌希尊者從宴坐起往世尊所却坐一旁而白佛言大德世尊我在菴摩羅林住欲覺瞋覺害覺三不善覺乃大增長我自念言奇哉奇哉昔所未有我以正信出家反受欲覺瞋覺害覺三不善覺之所降伏世尊白言彌希有五法能圓熟諸心未解脫者何種五法彌希住戒比丘有善知識有善友有善伴此是圓熟心未解脫者第一法復次有戒比丘攝護波羅提木叉比丘戒行持親近怖畏小罪修習學處此是圓熟心未解脫者第二法復次比丘如所希求排除煩惱自求心開以少欲偈知足偈遠離偈雜處偈精進偈戒偈禪定偈慧偈解脫偈解脫智見偈而生厭離離欲滅盡寂靜正智等覺涅槃此是圓熟心未能解脫者第三法復次精進比丘捨不善法行於善法大力勇健不捨善業此是圓熟心未能解脫者第四法復次有慧比丘以慧觀察生滅是智者正觀苦滅此是圓熟心未解脫者第五法此之五法是圓熟心未解脫者彌希此之五法是圓熟心未解脫者彌希有善知識有善友有善伴比丘可望得此有戒人乃至修習學處有善知識有善友有善伴比丘可望得此如所希求排除煩惱乃至解脫智見偈可望得此有善知識善友善伴比丘可望得此精進人乃至不捨善業有善知識乃至正觀苦滅彌希比丘既住五法應更修四法修不淨觀以捨貪修慈觀以捨瞋修數息觀以滅覺修無常觀以滅我慢彌希無常想比丘當得無我想得無我想者則能除現生我慢當證涅槃爾時世尊如是知已而自說言卑劣之覺微細之覺令人喜樂令人隨轉從生至生而不自知有正念者而又精進知心之覺而制伏之佛弟子眾當能捨去令人喜樂及所執著殘餘諸覺註覺覺觀之覺即尋伺之尋彌希經終第二憍慢經如是我聞一時世尊在拘尸那羅城未羅族諸王之莎羅林住時諸比丘多有自高憍慢浮薄饒舌多語忘念不自省心不堅固心多迷失不攝諸根於離佛不遠處森林洞窟住爾時世尊見諸比丘自高憍慢浮薄饒舌多語忘念不自省心不堅固心多迷失不攝諸根於森林洞窟住爾時世尊如是知已而自說言若諸比丘不攝護身墜入邪見昏沈睡眠之所覆蓋當受魔制以此之故諸比丘眾當守護心住正思惟正見為導知生起滅制諸昏沈及於睡眠如是當能棄捨一切諸惡趣等憍慢經終第三牧牛人經如是我聞一時世尊與大比丘眾往憍薩羅國時世尊在道旁一樹下敷座而坐時一牧牛者至世尊所禮世尊已却坐一旁坐已佛以法語教其立志奮勵悅樂時牧牛人聞佛說立志奮勵悅樂等教示即白佛言大德世尊請佛世尊及比丘眾明日受我供食世尊默然應諾牧牛人知世尊諾已即從座起作禮右繞而自辭去夜分過已牧牛人於其家中調諸眾多乳糜蔗水熟酥等已即往佛所而白佛言大德世尊飯食備訖今正是時時朝時分世尊著衣持鉢與比丘眾往牧牛人家敷座而坐時牧牛人以乳糜蔗水熟酥以佛為首供比丘眾世尊飯食訖牧牛人低座却坐一旁世尊以法語教示牧牛人立志奮勵悅樂已從座而起回歸佛所時世尊歸未久一男人入牧牛人家殺牧牛人死時諸比丘同往佛所却坐一旁而白佛言大德世尊我聞牧牛人以乳糜蔗水熟酥以佛為首供比丘眾已被一男子入其家中殺牧牛人死爾時世尊如是知已而自說言諸惡者人與惡者遇則互殘苦諸執怨人與執怨遇則互殘苦人立心惡則更多苦牧牛人經終第四月明經如是我聞一時世尊在王舍城祗陀林迦蘭陀迦園住時舍利弗尊者大迦葉尊者在迦布德迦精舍住時舍利弗新剃頭髮於月明夜在露天入定坐