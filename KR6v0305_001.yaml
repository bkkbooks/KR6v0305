波婆城鍛工子純陀之菴摩羅園住時鍛工子純陀聞世尊與大比丘眾遊行末羅國至波婆城在波婆城自己之園住即至佛所禮世尊已却坐一旁時世尊以法語開示純陀今明見受持精進悅喜鍛工子純陀受世尊法語開示明見受持精進悅喜已白世尊言大德世尊請世尊及比丘眾明日受我供食世尊默諾受供時鍛工子純陀知世尊諾已即從座起右繞作禮辭世尊去時夜分過鍛工子純陀在其家中設調眾妙嚼食物可食物及栴檀樹菇已往白佛言大德世尊今正是時食物已備爾時朝時世尊著衣持鉢往鍛工子純陀家而告之言純陀汝將栴檀樹菇供養我諸嚼食物可食物供養諸比丘鍛工子純陀諾已取栴檀樹菇供養世尊將嚼食物可食物供養諸比丘時飯食訖世尊告鍛工子純陀言純陀汝取栴檀樹菰殘餘食埋於地中我不見此界餘人乃至天界魔界梵界諸眾生沙門娑羅門人天等眾能食此栴檀樹菇除如來外鍛工子純陀諾已取栴檀樹菇殘餘食埋於地中往見世尊禮世尊已却坐一旁世尊以法語開示純陀令明見受持精進悅喜已即從座起却歸本處爾時世尊受鍛工子純陀供食已即患大病血痢劇痛將近涅槃爾時世尊正念正智安忍不動告阿難尊者言阿難汝來我將往拘尸那羅城阿難尊者諾世尊言如是我聞大德世尊受鍛工子純陀供食已病篤近於涅槃世尊病篤以食栴檀樹菇故世尊血痢告言我將往拘尸那羅城爾時世尊路中至一樹下告阿難尊者言阿難速為我敷四重僧伽梨衣我大疲乏欲坐休息阿難諾已即為世尊敷四重僧伽梨衣世尊坐於阿難尊者所敷座告阿難尊者言阿難速往取水來我渴欲飲阿難尊者白佛言大德世尊今現五百車輛行過於水水被輪碾污濁水少去此不遠有迦屈差河河水清涼岸層整齊是可樂處世尊可飲彼水可沐浴身如是再說乃至三說佛告阿難尊者阿難速往取水我渴欲飲阿難諾已持鉢往取河水爾時此河車輪碾過汙濁水少阿難尊者往取水即清滿時阿難尊者念言奇哉奇哉昔所未有如來有大神力有大威力此河被車輪碾過污濁水少我來取水水即清滿阿難尊者以鉢取水訖即往佛所而白佛言大德世尊奇哉奇哉大德世尊昔所未有如來有大神力有大威力此河被車輪碾過污濁水少我往取水水即清滿今請世尊飲請如來飲時世尊飲水訖爾時世尊與諸比丘往迦屈差河入河就浴飲訖往菴摩羅林召純陀尊者告言純陀汝為我敷四重僧伽梨衣我疲欲臥純陀尊者諾已敷四重僧伽梨衣獻佛時世尊右脅累足作獅子臥正念正智思惟起想純陀尊者坐於佛前於後後時達摩僧伽訶迦大師作如是偈時佛行至迦屈差河河水澄美無上導師甚為疲乏浴身飲水已而出河為比丘眾及人天眾之所圍繞有大德師證聖法已至菴摩林告純陀言汝為佛敷四重僧衣佛疲欲臥純陀尊者即速敷就四重僧衣導師世尊甚為疲乏乃即臥下純陀尊者坐於佛前爾時世尊告阿難尊者言阿難當有人令鍛工子純陀悔惱而告之言慧命純陀此非汝利汝得惡得如來受汝供食是最後供以佛即入涅槃故阿難汝當止鍛工子純陀悔惱而告之言慧命純陀此是汝利汝得善得如來受汝供食是最後供以佛即入涅槃故慧命純陀我如是聞我在佛前有如是聞有二種供食其果相等異熟相等較他供養有大果報二種云何一是供食已如來證無上正等覺一是供食已如來入於無餘涅槃如是二種供食其果相等異熟相等較他供食有大果報鍛工子純陀已積集壽增長業已積集麗色增長業已積集生天業已積集稱譽增長業已積集權勢增長業阿難汝當如是止鍛工子純陀悔惱爾時世尊如是知已而自說言諸布施者必得大福自調御者必無怨執諸善巧者則能捨惡既捨惡已能入涅槃以能滅盡貪瞋癡故註栴檀菇泰文本譯為乳豬原文有猪菇筍等義又近證實佛世當地人無吃猪肉者又多素食據漢譯長阿含遊行經譯為栴檀樹耳即附生於栴檀樹之天然菇日譯作栴檀樹茸義同菇純陀經終第六波吒離村人經如是我聞一時世尊與大比丘眾往遊行至摩竭陀國波吒離村波吒離村優婆塞優婆夷聞世尊與大比丘眾往摩竭陀國遊至波吒離村爾時波吒離村優婆塞眾往世尊所禮世尊已却坐一旁而白佛言大德世尊請世尊受我等供養休息堂世尊默然承諾時波吒離村優婆塞知佛諾已即從座起右繞作禮往休息堂敷應敷物設上座安水瓶及備胡麻油燈已即往佛所禮世尊已却坐一旁而白佛言大德世尊休息堂敷設已設上座安水瓶備胡麻油燈已請佛知時今正是時爾時朝時世尊著衣持鉢與比丘眾往休息堂佛洗足已入休息堂面向東方乃至諸比丘眾洗足已入休息堂坐倚壁面向東方圍繞世尊乃至波吒離村優婆塞眾洗足已入休息堂坐倚前壁面向西方圍繞世尊爾時世尊告波吒離村諸優婆塞眾言諸居士污戒者之破戒有五種患難何等為五謂污戒者於現世破戒以放逸故必失大財用此是污戒者破戒第一種患難復次污戒者之破戒惡名散佈此是污戒者破戒第二種患難復次污戒者之破戒入於大眾所謂國王眾婆羅門眾居士眾沙門眾則不勇敢慚耻行進此是污戒者破戒第三種患難復次污戒者之破戒迷惑致死此是污戒者破戒第四種患難復次污戒者之破戒命終墮入惡生惡趣墮處地獄此是污戒者破戒第五種患難諸居士污戒者之破戒有如是五種患難諸居士持戒者之淨戒有五種功德何等為五謂持戒者於現世淨戒以不放逸故必得大財用此是持戒者淨戒第一種功德復次持戒之淨戒稱譽遍起此是持戒者淨戒第二種功德復次持戒者之淨戒入於大眾所謂國王眾婆羅門眾居士眾沙門眾則大勇敢無有疚愧而入大眾此是持戒者之淨戒第三種功德復次持戒者之淨戒不迷惑死此是持戒者之淨戒第四種功德復次持戒者之淨戒必生善趣天界此是持戒者之淨戒第五種功德爾時世尊以法語令波吒離城優婆塞眾明見受持精進悅喜已時夜分過久佛即告言優婆塞夜分過久汝等當知今正是時時波吒離優婆塞眾甚深悅善佛所開示即從座起作禮右繞辭佛却去時優婆塞眾去已世尊即入室爾時摩竭陀大臣名須尼陀及禹舍婆沙迦羅將在波吒離村建城防衛跋闍諸王時守護波吒離村眾多百千天眾諸大位天則其大位王之王臣傾心於其地建立住家諸中位天則其中位王之王臣傾心於其地建立住家諸小位天則其小位王之王臣傾心於其地建立住家世尊以清淨天眼超諸人眼見彼守護波吒離村多百千天眾諸大位天乃至有諸小位天則其小位王之王臣傾心於其地建立住家時夜既明世尊問阿難尊者言阿難誰將在波吒離村建城阿難尊者答言大德世尊摩竭陀國大臣名須尼陀及禹舍將在波吒離建城防衛跋闍諸王佛言阿難摩竭陀國大臣名須尼陀及禹舍與三十三天諸天眾會議將在波吒離建城防衛跋闍諸王我以清淨天眼超諸人眼見諸守護波吒離城眾多百千天眾諸大位天乃至諸小位天則其小位王之王臣傾心於其地建立住家阿難此處將為聖者及商賈通運上會集所波吒離城將有三難火難水難離間難時摩竭陀國大臣名須尼陀及禹舍來至佛所問訊佛已却立一旁而白佛言瞿曇大德及比丘眾請受我等今日供食世尊默然受請時摩竭陀大臣名須尼陀及禹舍知佛受請即返其家於其家中設精妙嚼食物可食物已往告佛言大德世尊今正是時供食備已爾時朝時世尊與諸比丘著衣持鉢至摩竭陀國大臣名須尼及禹舍家坐於上座時摩竭陀國大臣名須尼陀及禹舍以佛為首及比丘眾自手供養嚼食物可食物時世尊飯食訖縮手出鉢摩竭陀國大臣須尼陀及禹舍坐於低座世尊以是偈隨喜摩竭陀國大臣須尼陀及禹舍賢種性人住居地已則當供養彼有戒人自調御人行梵行人應當供養彼地天眾天眾受彼賢種性人供養恭敬則恭敬彼賢種性人如母護子善福增上時世尊唱隨喜偈已即從座起却行而去時摩竭陀國大臣名須尼陀及禹舍隨世尊後而自念言今日瞿曇沙門行出何門彼門則名為瞿曇門渡恒河處則名為瞿曇渡時恒河水滿河岸可供鴉飲有諸人眾或在求舟或在求筏或在作桴欲到彼岸而佛世尊與比丘眾如壯士屈伸臂頃於恒河此岸而到彼岸世尊見諸人眾或在求舟或在求筏或在作桴欲到彼岸爾時世尊如是知已而自說言人若求渡輪迴之河及愛欲池彼眾必造聖道之橋不著諸等色欲之泥乃得渡過欲過小河猶當作桴佛及弟子是有慧者無有諸桴亦能渡河波吒離村人經終第七岐路經如是我聞一時世尊與隨僧那伽娑摩羅往憍薩羅國那伽尊者途中見岐路而白佛言大德世尊此是道請同行此道世尊告那伽尊者言那伽娑摩羅此是道同行此道如是再說乃至三說而那伽尊者仍白佛言此是道請同行此道乃至三說佛告那伽尊者言那伽娑摩羅此是道同行此道爾時那伽尊者即取世尊衣鉢置於其處而白佛言大德世尊此是衣鉢說已却去那伽尊者行去彼道在道中遇賊打踢那伽尊者破鉢裂衣時那伽尊者持破鉢破衣而回至世尊所禮世尊已却坐一旁而白佛言大德世尊我經彼道中遇賊打踢我身破鉢裂衣爾時世尊如是知已而自說言諸有智者與無智者混同行往而能棄捨無智者人不善知者猶如蒼鷺以水混乳而與之飲彼能飲乳而棄捨水岐路經終第八毗舍佉經如是我聞一時世尊在舍衛城東園鹿母講堂住時鹿母毗舍佉所愛喜之孫死鹿母毗舍佉衣髮濡濕於午時分到世尊所禮世尊已却坐一旁佛問鹿母毗舍佉言毗舍佉汝何處來衣髮濡濕於午時分而來至此鹿母毗舍佉言大德世尊我可愛喜之孫死以此之故我衣髮濡濕於午時分而來至此佛言毗舍佉汝望得子孫如舍衛城人數否答言大德世尊我望得子孫如舍衛城人數佛言毗舍佉舍衛城人每日死去若干答言大德世尊舍衛城人每日死去或十人或九人或八人或七人或六人或五人或四人或三人或二人或一人佛言毗舍佉於汝意云何如是汝當或時或處衣髮濡濕否答言大德世尊不如是也如是眾多子孫我已足也佛言毗舍佉有百愛者有百苦有九十愛者有九十苦有八十愛者有八十苦有七十愛者有七十苦有六十愛者有六十苦有五十愛者有五十苦有四十愛者有四十苦有三十愛者有三十苦有二十愛者有二十苦有十愛者有十苦有九愛者有九苦有八愛者有八苦有七愛者有七苦有六愛者有六苦有五愛者有五苦有四愛者有四苦有三愛者有三苦有二愛者有二苦有一愛者有一苦無有愛者則無有苦我說彼人無有憂悲無有漏垢無有痛苦爾時世尊如是知已而自說言世間眾多憂悲苦惱以愛著生或色身故無有眾生及無色身則眾生無憂悲苦惱以此之故不愛著於世世眾生及色身者必得安樂無有憂悲以此之故望無憂悲及垢漏者不應愛著世世眾生及其色身毗舍佉經終第九陀驃經之一如是我聞一時世尊在王舍城竹林迦蘭陀迦園住爾時陀驃摩羅子尊者至世尊所禮世尊已却坐一旁而白佛言大德如來今時是我般涅槃時佛言陀驃汝當知時今正是時時陀驃尊者即從座起右繞世尊禮拜佛已上昇虛空於虛空中結跏趺坐入火大定而般涅槃時陀驃尊者上昇虛空於虛空中結跏趺坐入火大定而般涅槃軀體火焚而無餘灰亦無餘煤如焚醍醐及胡麻油無有餘灰無有餘煤爾時世尊如是知已而自說言色身壞已想已滅已諸愛冷已諸行寂已識無住所陀驃經之一終第十陀