body:
  text: 目錄小部經第一小誦經一三歸依文一二十戒文一三三十一身分二四問沙彌文二五吉祥經三四六三寶經四七七戶外經七九八伏藏經九一九慈悲經一一一第二法句經一雙品一三一六二不放逸品一六一七三心品一七一八四花品一九二十五愚品二一二二六賢品二二二四七阿羅漢品二四二五八千品二五二七九惡品二七二八十刑害品二八三十一老品三三一十二自己品三一三二十三世間品三三三四十四佛陀品三四三六十五安樂品三六三七十六愛好品三八三九十七忿怒品三九四一十八垢穢品四一四三十九法住品四三四五二十道品四六四八二一雜品四八五二二地獄品五五一二三象品五二五三二四愛欲品五四五五二五比丘品五八五九二六婆羅門品六一六四第三自說經一菩提品六七七九菩提一二三牧羊者尼拘律林長老大迦葉波吒戰勝結髮婆希二目真鄰陀品八九五目真鄰陀王刑害供養優婆塞胎婦一子蘇波婆沙毗舍佉迦利瞿陀三難陀品九六一一三業難陀耶輸闍舍利弗拘律陀畢陵迦大迦葉托鉢技藝世間四彌醯品一一四一三彌希憍慢牧牛人月明象賓頭盧舍利弗優婆先那婆檀提子舍利弗五蘇那長老品一三一一五一王短命癩病者兒童布薩蘇那離婆多阿難喧嘩槃特六生盲品一五二一七四捨壽靜處獨坐已說傳聞一二外道須菩提婬婦過度出現七小品一七五一八四跋提一二欲一二跋提三滅愛滅妄想大迦栴延井優填八波吒離村人語品一八四二三涅槃一二三四純陀波吒離村人岐路毗舍佉陀驃一二第四如是語經第一集第一品二五二一二貪一瞋一痴忿覆慢一一切慢二貪二瞋二第二品二一三二二一痴忿覆痴愛有學一二破悅人第三品二二二二二八定心福二種利毗補羅山知而故作妄語布施慈修第二集第一品二二八二三八比丘之一比丘之二焦惱無焦惱戒之一戒之二勤無詐之一無詐之二歡喜第二品二三九二五二尋思說法明慧法無生界獨居學處覺悟無幸處見第三集第一品二五二二六不善報界受之一受之二求之一求之二漏之一漏之二愛魔罥第二品二六二七福業事眼根時惡行善行清淨寂貪之一貪之二第三品邪見正見出離色兒不降雨樂滅壞戒退失第四品尋思恭敬聲天世間不淨法黑暗污提婆達多第五品信活命和合衣火觀察生欲善施法第四集三六三一九婆羅門四事知沙門戒愛梵資護欺誑人行具足戒世間
